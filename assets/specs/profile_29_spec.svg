<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 120" fill="none">
  <!--
    Sheet Profile 400 x 11mm — Cross-Section
    Scale: ~0.62px per mm (viewBox scaled to fit 800px rect into ~500px drawing area)
    Actual rect at scale: 800px x 22px, rendered via viewBox scaling
    Using internal coordinates with rect 500px wide x 14px tall (scaled proportionally)
  -->
  <defs>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#E8833A" stroke-width="0.5" opacity="0.06"/>
    </pattern>
  </defs>

  <g transform="translate(35, 28)">
    <!-- ===== PROFILE CROSS-SECTION ===== -->
    <!-- 400mm wide x 11mm tall. Using scale factor 0.6125: 400*1.225=490px wide, 11*1.225=13.5px tall -->
    <!-- Keeping visual proportions clear: rect 490px x 13px -->

    <!-- Solid material fill -->
    <rect x="0" y="0" width="490" height="13"
      fill="rgba(196,129,58,0.15)" stroke="#E8833A" stroke-width="1.8"/>

    <!-- Diagonal hatching on solid material -->
    <rect x="0" y="0" width="490" height="13" fill="url(#hatch)"/>

    <!-- ===== DIMENSION LINES ===== -->

    <!-- BOTTOM: Overall width 400mm -->
    <line x1="0" y1="18" x2="0" y2="29" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="490" y1="18" x2="490" y2="29" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="0" y1="26" x2="231" y2="26" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="259" y1="26" x2="490" y2="26" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="0,26 5,24 5,28" fill="rgba(255,255,255,0.4)"/>
    <polygon points="490,26 485,24 485,28" fill="rgba(255,255,255,0.4)"/>
    <text x="245" y="30" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">400</text>

    <!-- RIGHT: Overall height 11mm -->
    <line x1="495" y1="0" x2="506" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="495" y1="13" x2="506" y2="13" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="503" y1="0" x2="503" y2="1" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="503" y1="12" x2="503" y2="13" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="503,0 501,4 505,4" fill="rgba(255,255,255,0.4)"/>
    <polygon points="503,13 501,9 505,9" fill="rgba(255,255,255,0.4)"/>
    <text x="518" y="10" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">11</text>

    <!-- Center axis -->
    <line x1="245" y1="-4" x2="245" y2="17" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="8,5"/>
  </g>

  <!-- Unit note -->
  <text x="280" y="95" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="0.04em">All dimensions in mm</text>
</svg>