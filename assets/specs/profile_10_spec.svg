<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 135" fill="none">
  <!--
    Sheet Profile 100 x 10mm — Cross-Section
    Scale: 2px per mm
    Rectangle: 200px wide x 20px tall
  -->
  <defs>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#E8833A" stroke-width="0.5" opacity="0.06"/>
    </pattern>
  </defs>

  <g transform="translate(55, 30)">
    <!-- ===== PROFILE CROSS-SECTION ===== -->

    <!-- Solid material fill -->
    <rect x="0" y="0" width="200" height="20"
      fill="rgba(196,129,58,0.15)" stroke="#E8833A" stroke-width="1.8"/>

    <!-- Diagonal hatching on solid material -->
    <rect x="0" y="0" width="200" height="20" fill="url(#hatch)"/>

    <!-- ===== DIMENSION LINES ===== -->

    <!-- BOTTOM: Overall width 100mm -->
    <line x1="0" y1="25" x2="0" y2="36" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="200" y1="25" x2="200" y2="36" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="0" y1="33" x2="86" y2="33" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="114" y1="33" x2="200" y2="33" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="0,33 5,31 5,35" fill="rgba(255,255,255,0.4)"/>
    <polygon points="200,33 195,31 195,35" fill="rgba(255,255,255,0.4)"/>
    <text x="100" y="37" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">100</text>

    <!-- RIGHT: Overall height 10mm -->
    <line x1="205" y1="0" x2="216" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="205" y1="20" x2="216" y2="20" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="213" y1="0" x2="213" y2="4" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="213" y1="16" x2="213" y2="20" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="213,0 211,4 215,4" fill="rgba(255,255,255,0.4)"/>
    <polygon points="213,20 211,16 215,16" fill="rgba(255,255,255,0.4)"/>
    <text x="228" y="13" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">10</text>

    <!-- Center axis -->
    <line x1="100" y1="-4" x2="100" y2="24" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="8,5"/>
  </g>

  <!-- Unit note -->
  <text x="155" y="105" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="0.04em">All dimensions in mm</text>
</svg>