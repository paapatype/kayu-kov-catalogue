<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 320" fill="none">
  <!--
    Square Box Profile 100 x 100 x 8mm — Cross-Section
    Scale: 2px per mm
    Outer: 200x200px, Wall: 16px, Inner void: 168x168px
  -->
  <defs>
    <clipPath id="solidArea">
      <rect x="0" y="0" width="200" height="200"/>
    </clipPath>
  </defs>

  <g transform="translate(60, 30)">
    <!-- ===== PROFILE CROSS-SECTION ===== -->

    <!-- Outer square — solid material fill -->
    <rect x="0" y="0" width="200" height="200"
      fill="rgba(196,129,58,0.15)" stroke="#E8833A" stroke-width="1.8" rx="1"/>

    <!-- Inner void -->
    <rect x="16" y="16" width="168" height="168"
      fill="#1E2D3D" stroke="rgba(232,131,58,0.35)" stroke-width="0.8" rx="1"/>

    <!-- Subtle hatching on solid material -->
    <g clip-path="url(#solidArea)" opacity="0.06" stroke="#E8833A" stroke-width="0.5">
      <line x1="-10" y1="10" x2="10" y2="-10"/><line x1="-10" y1="20" x2="20" y2="-10"/>
      <line x1="-10" y1="30" x2="30" y2="-10"/><line x1="-10" y1="40" x2="40" y2="-10"/>
      <line x1="-10" y1="50" x2="50" y2="-10"/><line x1="-10" y1="60" x2="60" y2="-10"/>
      <line x1="-10" y1="70" x2="70" y2="-10"/><line x1="-10" y1="80" x2="80" y2="-10"/>
      <line x1="-10" y1="90" x2="90" y2="-10"/><line x1="-10" y1="100" x2="100" y2="-10"/>
      <line x1="-10" y1="110" x2="110" y2="-10"/><line x1="-10" y1="120" x2="120" y2="-10"/>
      <line x1="-10" y1="130" x2="130" y2="-10"/><line x1="-10" y1="140" x2="140" y2="-10"/>
      <line x1="-10" y1="150" x2="150" y2="-10"/><line x1="-10" y1="160" x2="160" y2="-10"/>
      <line x1="-10" y1="170" x2="170" y2="-10"/><line x1="-10" y1="180" x2="180" y2="-10"/>
      <line x1="-10" y1="190" x2="190" y2="-10"/><line x1="-10" y1="200" x2="200" y2="-10"/>
      <line x1="-10" y1="210" x2="210" y2="-10"/><line x1="0" y1="210" x2="210" y2="0"/>
      <line x1="10" y1="210" x2="210" y2="10"/><line x1="20" y1="210" x2="210" y2="20"/>
      <line x1="30" y1="210" x2="210" y2="30"/><line x1="40" y1="210" x2="210" y2="40"/>
      <line x1="50" y1="210" x2="210" y2="50"/><line x1="60" y1="210" x2="210" y2="60"/>
      <line x1="70" y1="210" x2="210" y2="70"/><line x1="80" y1="210" x2="210" y2="80"/>
      <line x1="90" y1="210" x2="210" y2="90"/><line x1="100" y1="210" x2="210" y2="100"/>
      <line x1="110" y1="210" x2="210" y2="110"/><line x1="120" y1="210" x2="210" y2="120"/>
      <line x1="130" y1="210" x2="210" y2="130"/><line x1="140" y1="210" x2="210" y2="140"/>
      <line x1="150" y1="210" x2="210" y2="150"/><line x1="160" y1="210" x2="210" y2="160"/>
      <line x1="170" y1="210" x2="210" y2="170"/><line x1="180" y1="210" x2="210" y2="180"/>
    </g>

    <!-- ===== DIMENSION LINES ===== -->

    <!-- BOTTOM: Overall width 100mm -->
    <line x1="0" y1="205" x2="0" y2="216" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="200" y1="205" x2="200" y2="216" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="0" y1="213" x2="88" y2="213" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="112" y1="213" x2="200" y2="213" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="0,213 5,211 5,215" fill="rgba(255,255,255,0.4)"/>
    <polygon points="200,213 195,211 195,215" fill="rgba(255,255,255,0.4)"/>
    <text x="100" y="217" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">100</text>

    <!-- RIGHT: Overall height 100mm -->
    <line x1="205" y1="0" x2="216" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="205" y1="200" x2="216" y2="200" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="213" y1="0" x2="213" y2="90" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="213" y1="110" x2="213" y2="200" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="213,0 211,5 215,5" fill="rgba(255,255,255,0.4)"/>
    <polygon points="213,200 211,195 215,195" fill="rgba(255,255,255,0.4)"/>
    <text x="213" y="103" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">100</text>

    <!-- RIGHT: Wall thickness 8mm -->
    <line x1="228" y1="0" x2="239" y2="0" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="228" y1="16" x2="239" y2="16" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="236" y1="0" x2="236" y2="16" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="236,0 234.5,3 237.5,3" fill="rgba(255,255,255,0.3)"/>
    <polygon points="236,16 234.5,13 237.5,13" fill="rgba(255,255,255,0.3)"/>
    <text x="249" y="11" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">8</text>

    <!-- Center axis -->
    <line x1="100" y1="-4" x2="100" y2="204" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="8,5"/>
  </g>

  <!-- Unit note -->
  <text x="190" y="295" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="0.04em">All dimensions in mm</text>
</svg>