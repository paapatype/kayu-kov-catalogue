<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 300" fill="none">
  <!--
    C Channel Profile 50 x 50 x 6mm — Cross-Section
    Scale: 2px per mm
    Overall: 50mm wide (100px) x 50mm tall (100px)
    Wall thickness: 6mm (12px)
    Shape: U/C channel — bottom + two vertical legs, open at top
  -->

  <g transform="translate(110, 45)">
    <!-- ===== PROFILE CROSS-SECTION ===== -->

    <!-- C-channel shape: open top U -->
    <!-- Outer boundary: rect 0,0 to 100,100 minus the open interior -->
    <!-- Path: start top-left, down left side, across bottom, up right side, step in by wall,
         down inside right, across inside bottom, up inside left, close at top -->
    <path d="M0,0 L0,100 L100,100 L100,0 L88,0 L88,88 L12,88 L12,0 Z"
      fill="rgba(196,129,58,0.15)" stroke="#E8833A" stroke-width="1.8"/>

    <!-- Interior void (navy) -->
    <rect x="12" y="0" width="76" height="88" fill="#1E2D3D"/>
    <rect x="12" y="0" width="76" height="88" fill="none" stroke="rgba(232,131,58,0.35)" stroke-width="0.8"/>

    <!-- Subtle hatching on solid material -->
    <g opacity="0.06" stroke="#E8833A" stroke-width="0.5">
      <!-- Left leg -->
      <line x1="0" y1="10" x2="10" y2="0"/>
      <line x1="0" y1="20" x2="12" y2="8"/>
      <line x1="0" y1="30" x2="12" y2="18"/>
      <line x1="0" y1="40" x2="12" y2="28"/>
      <line x1="0" y1="50" x2="12" y2="38"/>
      <line x1="0" y1="60" x2="12" y2="48"/>
      <line x1="0" y1="70" x2="12" y2="58"/>
      <line x1="0" y1="80" x2="12" y2="68"/>
      <line x1="0" y1="90" x2="12" y2="78"/>
      <line x1="0" y1="100" x2="12" y2="88"/>
      <!-- Bottom bar -->
      <line x1="10" y1="100" x2="22" y2="88"/>
      <line x1="20" y1="100" x2="32" y2="88"/>
      <line x1="30" y1="100" x2="42" y2="88"/>
      <line x1="40" y1="100" x2="52" y2="88"/>
      <line x1="50" y1="100" x2="62" y2="88"/>
      <line x1="60" y1="100" x2="72" y2="88"/>
      <line x1="70" y1="100" x2="82" y2="88"/>
      <line x1="80" y1="100" x2="92" y2="88"/>
      <!-- Right leg -->
      <line x1="88" y1="88" x2="100" y2="76"/>
      <line x1="88" y1="78" x2="100" y2="66"/>
      <line x1="88" y1="68" x2="100" y2="56"/>
      <line x1="88" y1="58" x2="100" y2="46"/>
      <line x1="88" y1="48" x2="100" y2="36"/>
      <line x1="88" y1="38" x2="100" y2="26"/>
      <line x1="88" y1="28" x2="100" y2="16"/>
      <line x1="88" y1="18" x2="100" y2="6"/>
      <line x1="88" y1="8" x2="100" y2="-4"/>
    </g>

    <!-- Center axis -->
    <line x1="50" y1="-4" x2="50" y2="104" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="8,5"/>

    <!-- ===== DIMENSION LINES ===== -->

    <!-- BOTTOM: Overall width 50mm -->
    <line x1="0" y1="106" x2="0" y2="117" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="100" y1="106" x2="100" y2="117" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="0" y1="114" x2="38" y2="114" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="62" y1="114" x2="100" y2="114" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="0,114 5,112 5,116" fill="rgba(255,255,255,0.4)"/>
    <polygon points="100,114 95,112 95,116" fill="rgba(255,255,255,0.4)"/>
    <text x="50" y="118" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">50</text>

    <!-- BOTTOM ROW 2: Wall thickness 6mm left -->
    <line x1="0" y1="125" x2="0" y2="134" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="12" y1="125" x2="12" y2="134" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="0" y1="131" x2="12" y2="131" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="0,131 4,129.5 4,132.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="12,131 8,129.5 8,132.5" fill="rgba(255,255,255,0.3)"/>
    <text x="6" y="144" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">6</text>

    <!-- LEFT: Overall height 50mm -->
    <line x1="-6" y1="0" x2="-17" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="-6" y1="100" x2="-17" y2="100" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="-14" y1="0" x2="-14" y2="43" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="-14" y1="57" x2="-14" y2="100" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="-14,0 -16,5 -12,5" fill="rgba(255,255,255,0.4)"/>
    <polygon points="-14,100 -16,95 -12,95" fill="rgba(255,255,255,0.4)"/>
    <text x="-14" y="54" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">50</text>
  </g>

  <!-- Unit note -->
  <text x="180" y="230" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="0.04em">All dimensions in mm</text>
</svg>