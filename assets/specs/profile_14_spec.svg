<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 140" fill="none">
  <!--
    Sheet Profile 150 x 12mm — Cross-Section
    Scale: 2px per mm
    Rectangle: 300px wide x 24px tall
  -->
  <defs>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#E8833A" stroke-width="0.5" opacity="0.06"/>
    </pattern>
  </defs>

  <g transform="translate(55, 30)">
    <!-- ===== PROFILE CROSS-SECTION ===== -->

    <!-- Solid material fill -->
    <rect x="0" y="0" width="300" height="24"
      fill="rgba(196,129,58,0.15)" stroke="#E8833A" stroke-width="1.8"/>

    <!-- Diagonal hatching on solid material -->
    <rect x="0" y="0" width="300" height="24" fill="url(#hatch)"/>

    <!-- ===== DIMENSION LINES ===== -->

    <!-- BOTTOM: Overall width 150mm -->
    <line x1="0" y1="29" x2="0" y2="40" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="300" y1="29" x2="300" y2="40" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="0" y1="37" x2="136" y2="37" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="164" y1="37" x2="300" y2="37" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="0,37 5,35 5,39" fill="rgba(255,255,255,0.4)"/>
    <polygon points="300,37 295,35 295,39" fill="rgba(255,255,255,0.4)"/>
    <text x="150" y="41" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">150</text>

    <!-- RIGHT: Overall height 12mm -->
    <line x1="305" y1="0" x2="316" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="305" y1="24" x2="316" y2="24" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="313" y1="0" x2="313" y2="6" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="313" y1="18" x2="313" y2="24" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="313,0 311,4 315,4" fill="rgba(255,255,255,0.4)"/>
    <polygon points="313,24 311,20 315,20" fill="rgba(255,255,255,0.4)"/>
    <text x="328" y="15" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">12</text>

    <!-- Center axis -->
    <line x1="150" y1="-4" x2="150" y2="28" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="8,5"/>
  </g>

  <!-- Unit note -->
  <text x="205" y="110" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="0.04em">All dimensions in mm</text>
</svg>