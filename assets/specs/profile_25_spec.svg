<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" fill="none">
  <!--
    Single Door Frame 85x31mm — Cross-Section
    Scale: 2px per mm
    Base: 85x31mm (170x62px) with L-shaped step: left 50mm extends up 11mm
    Chamber: 61x19mm (122x38px) centered in base portion
    Layout: 12|61|12 walls, 6|19|6 height
  -->

  <g transform="translate(80, 40)">
    <!-- ===== PROFILE CROSS-SECTION ===== -->

    <!-- 1. Outer shape: L-shaped step — left portion goes up 11mm (22px) -->
    <!-- Top-left at (0,0), step down at x=100, base bottom at y=84 -->
    <path d="M0,0 L100,0 L100,22 L170,22 L170,84 L0,84 Z"
      fill="rgba(196,129,58,0.15)" stroke="#E8833A" stroke-width="1.8"/>

    <!-- 2. Chamber void (centered in base 31mm portion, base top at y=22) -->
    <!-- x: 12mm=24px from left, w: 61mm=122px. y: 22+6mm=22+12=34, h: 19mm=38px -->
    <rect x="24" y="34" width="122" height="38" fill="#1E2D3D" rx="2"/>
    <rect x="24" y="34" width="122" height="38" fill="none" stroke="rgba(232,131,58,0.35)" stroke-width="0.8" rx="2"/>

    <!-- 3. Subtle hatching on solid material -->
    <g opacity="0.06" stroke="#E8833A" stroke-width="0.5">
      <line x1="-5" y1="10" x2="10" y2="-5"/><line x1="-5" y1="20" x2="20" y2="-5"/>
      <line x1="-5" y1="30" x2="30" y2="-5"/><line x1="-5" y1="40" x2="40" y2="-5"/>
      <line x1="-5" y1="50" x2="50" y2="-5"/><line x1="-5" y1="60" x2="60" y2="-5"/>
      <line x1="-5" y1="70" x2="70" y2="-5"/><line x1="-5" y1="80" x2="80" y2="-5"/>
      <line x1="5" y1="90" x2="90" y2="5"/><line x1="15" y1="90" x2="100" y2="5"/>
      <line x1="100" y1="90" x2="180" y2="10"/><line x1="110" y1="90" x2="180" y2="20"/>
      <line x1="120" y1="90" x2="180" y2="30"/><line x1="130" y1="90" x2="180" y2="40"/>
      <line x1="140" y1="90" x2="180" y2="50"/><line x1="150" y1="90" x2="180" y2="60"/>
    </g>

    <!-- ===== DIMENSION LINES ===== -->

    <!-- BOTTOM: Overall width 85mm -->
    <line x1="0" y1="89" x2="0" y2="100" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="170" y1="89" x2="170" y2="100" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="0" y1="97" x2="72" y2="97" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="98" y1="97" x2="170" y2="97" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="0,97 5,95 5,99" fill="rgba(255,255,255,0.4)"/>
    <polygon points="170,97 165,95 165,99" fill="rgba(255,255,255,0.4)"/>
    <text x="85" y="101" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">85</text>

    <!-- TOP: 50mm left segment and 35mm right segment -->
    <line x1="0" y1="-5" x2="0" y2="-14" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="100" y1="-5" x2="100" y2="-14" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="0" y1="-11" x2="40" y2="-11" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="60" y1="-11" x2="100" y2="-11" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="0,-11 4,-12.5 4,-9.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="100,-11 96,-12.5 96,-9.5" fill="rgba(255,255,255,0.3)"/>
    <text x="50" y="-7" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">50</text>

    <!-- Top: 35mm right segment (from step to right edge) -->
    <line x1="170" y1="17" x2="170" y2="8" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="100" y1="17" x2="100" y2="8" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="100" y1="11" x2="125" y2="11" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="145" y1="11" x2="170" y2="11" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="100,11 104,9.5 104,12.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="170,11 166,9.5 166,12.5" fill="rgba(255,255,255,0.3)"/>
    <text x="135" y="15" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">35</text>

    <!-- RIGHT: Base height 31mm -->
    <line x1="175" y1="22" x2="186" y2="22" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="175" y1="84" x2="186" y2="84" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="183" y1="22" x2="183" y2="46" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="183" y1="60" x2="183" y2="84" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="183,22 181,27 185,27" fill="rgba(255,255,255,0.4)"/>
    <polygon points="183,84 181,79 185,79" fill="rgba(255,255,255,0.4)"/>
    <text x="183" y="56" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">31</text>

    <!-- LEFT: Step height 11mm -->
    <line x1="-5" y1="0" x2="-14" y2="0" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="-5" y1="22" x2="-14" y2="22" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="-11" y1="0" x2="-11" y2="22" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="-11,0 -12.5,4 -9.5,4" fill="rgba(255,255,255,0.3)"/>
    <polygon points="-11,22 -12.5,18 -9.5,18" fill="rgba(255,255,255,0.3)"/>
    <text x="-22" y="14" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">11</text>

    <!-- BOTTOM ROW 2: Internal segments -->
    <!-- 12mm left wall -->
    <line x1="0" y1="109" x2="0" y2="118" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="24" y1="109" x2="24" y2="118" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="0" y1="115" x2="24" y2="115" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="0,115 4,113.5 4,116.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="24,115 20,113.5 20,116.5" fill="rgba(255,255,255,0.3)"/>
    <text x="12" y="128" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">12</text>

    <!-- 61mm chamber -->
    <line x1="24" y1="109" x2="24" y2="118" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="146" y1="109" x2="146" y2="118" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="24" y1="115" x2="75" y2="115" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="95" y1="115" x2="146" y2="115" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="24,115 28,113.5 28,116.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="146,115 142,113.5 142,116.5" fill="rgba(255,255,255,0.3)"/>
    <text x="85" y="128" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">61</text>

    <!-- 12mm right wall -->
    <line x1="146" y1="109" x2="146" y2="118" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="170" y1="109" x2="170" y2="118" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="146" y1="115" x2="170" y2="115" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="146,115 150,113.5 150,116.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="170,115 166,113.5 166,116.5" fill="rgba(255,255,255,0.3)"/>
    <text x="158" y="128" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">12</text>

    <!-- FAR RIGHT: Chamber height dims 6|19|6 -->
    <line x1="198" y1="22" x2="209" y2="22" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="198" y1="34" x2="209" y2="34" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="206" y1="22" x2="206" y2="34" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="206,22 204.5,25 207.5,25" fill="rgba(255,255,255,0.3)"/>
    <polygon points="206,34 204.5,31 207.5,31" fill="rgba(255,255,255,0.3)"/>
    <text x="218" y="31" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">6</text>

    <line x1="198" y1="34" x2="209" y2="34" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="198" y1="72" x2="209" y2="72" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="206" y1="34" x2="206" y2="47" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="206" y1="59" x2="206" y2="72" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="206,34 204.5,37 207.5,37" fill="rgba(255,255,255,0.3)"/>
    <polygon points="206,72 204.5,69 207.5,69" fill="rgba(255,255,255,0.3)"/>
    <text x="218" y="56" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">19</text>

    <line x1="198" y1="72" x2="209" y2="72" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="198" y1="84" x2="209" y2="84" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="206" y1="72" x2="206" y2="84" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="206,72 204.5,75 207.5,75" fill="rgba(255,255,255,0.3)"/>
    <polygon points="206,84 204.5,81 207.5,81" fill="rgba(255,255,255,0.3)"/>
    <text x="218" y="81" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">6</text>

    <!-- Center axis -->
    <line x1="85" y1="-4" x2="85" y2="88" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="8,5"/>
  </g>

  <!-- Unit note -->
  <text x="210" y="210" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="0.04em">All dimensions in mm</text>
</svg>