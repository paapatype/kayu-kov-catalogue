<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" fill="none">
  <!--
    Rod Profile 9mm diameter — Cross-Section
    Scale: 6px per mm → radius 27px, diameter 54px
    (Upscaled for visibility, labeled in real mm)
  -->
  <defs>
    <pattern id="hatch45" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#E8833A" stroke-width="0.5" opacity="0.08"/>
    </pattern>
  </defs>

  <g>
    <!-- ===== PROFILE CROSS-SECTION ===== -->

    <!-- Solid circle fill -->
    <circle cx="100" cy="60" r="27"
      fill="rgba(196,129,58,0.15)" stroke="#E8833A" stroke-width="1.8"/>

    <!-- Hatching on solid material -->
    <circle cx="100" cy="60" r="27" fill="url(#hatch45)"/>

    <!-- Center crosshair -->
    <line x1="100" y1="55" x2="100" y2="65" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
    <line x1="95" y1="60" x2="105" y2="60" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>

    <!-- ===== DIMENSION LINES ===== -->

    <!-- Diameter dimension: horizontal through center -->
    <line x1="73" y1="60" x2="92" y2="60" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="108" y1="60" x2="127" y2="60" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="73,60 78,58 78,62" fill="rgba(255,255,255,0.4)"/>
    <polygon points="127,60 122,58 122,62" fill="rgba(255,255,255,0.4)"/>
    <!-- Extension lines -->
    <line x1="73" y1="48" x2="73" y2="72" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="127" y1="48" x2="127" y2="72" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <text x="100" y="64" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">Dia. 9</text>

    <!-- Bottom overall dimension -->
    <line x1="73" y1="92" x2="73" y2="102" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="127" y1="92" x2="127" y2="102" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="73" y1="99" x2="93" y2="99" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="107" y1="99" x2="127" y2="99" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="73,99 78,97 78,101" fill="rgba(255,255,255,0.4)"/>
    <polygon points="127,99 122,97 122,101" fill="rgba(255,255,255,0.4)"/>
    <text x="100" y="103" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">9</text>

    <!-- Center axis vertical -->
    <line x1="100" y1="28" x2="100" y2="92" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="8,5"/>
  </g>

  <!-- Unit note -->
  <text x="100" y="140" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="0.04em">All dimensions in mm</text>
</svg>