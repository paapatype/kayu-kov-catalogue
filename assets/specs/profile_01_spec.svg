<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 210" fill="none">
  <!--
    Fluted Profile-3  145 x 18mm — Cross-Section
    Scale: 2px per mm  →  290px wide, 36px tall

    Structure (from reference):
    - Flat bottom plate 8mm (y=20→36)
    - 3 deep channels opening from top, each ~26mm wide
    - Channels go from top (y=0) down to bottom plate (y=20)
    - Narrow 9mm webs between channels, rising only 5mm above bottom plate (to y=10)
    - Full-height edges on left and right with R6.5 corners
    - S-curve transitions at all channel/edge/web boundaries
    - R6.0 curves at channel bottoms, R6.5 at top corners

    Layout (px at 2px/mm):
    49 edge | 52 ch | 18 web | 52 ch | 18 web | 52 ch | 49 edge = 290px
  -->

  <g transform="translate(70, 50)">
    <!-- ===== PROFILE CROSS-SECTION ===== -->

    <!-- Material outline — the wavy profile shape -->
    <path d="
      M 0,36
      L 0,6
      Q 0,0 6,0
      L 30,0
      C 36,0 43,20 49,20
      L 101,20
      C 101,14 104,10 107,10
      L 113,10
      C 116,10 119,14 119,20
      L 171,20
      C 171,14 174,10 177,10
      L 183,10
      C 186,10 189,14 189,20
      L 241,20
      C 247,20 254,0 260,0
      L 284,0
      Q 290,0 290,6
      L 290,36
      Z
    " fill="rgba(196,129,58,0.15)" stroke="#E8833A" stroke-width="1.8"/>

    <!-- Channel void 1 (between left edge and web 1) -->
    <path d="
      M 30,0
      C 36,0 43,20 49,20
      L 101,20
      C 101,14 104,10 107,10
      L 107,0
      Z
    " fill="#1E2D3D" stroke="rgba(232,131,58,0.35)" stroke-width="0.8"/>

    <!-- Channel void 2 (between web 1 and web 2) -->
    <path d="
      M 113,0
      L 113,10
      C 116,10 119,14 119,20
      L 171,20
      C 171,14 174,10 177,10
      L 177,0
      Z
    " fill="#1E2D3D" stroke="rgba(232,131,58,0.35)" stroke-width="0.8"/>

    <!-- Channel void 3 (between web 2 and right edge) -->
    <path d="
      M 183,0
      L 183,10
      C 186,10 189,14 189,20
      L 241,20
      C 247,20 254,0 260,0
      Z
    " fill="#1E2D3D" stroke="rgba(232,131,58,0.35)" stroke-width="0.8"/>

    <!-- Subtle hatching on solid material -->
    <g opacity="0.06" stroke="#E8833A" stroke-width="0.5">
      <line x1="-5" y1="8" x2="8" y2="-5"/>
      <line x1="-5" y1="18" x2="18" y2="-5"/>
      <line x1="-5" y1="28" x2="28" y2="-5"/>
      <line x1="-5" y1="38" x2="38" y2="-5"/>
      <line x1="255" y1="42" x2="296" y2="1"/>
      <line x1="265" y1="42" x2="296" y2="11"/>
      <line x1="275" y1="42" x2="296" y2="21"/>
      <line x1="285" y1="42" x2="296" y2="31"/>
    </g>

    <!-- ===== DIMENSION LINES ===== -->

    <!-- TOP: 35.0mm channel center-to-center spacing -->
    <line x1="72" y1="-5" x2="72" y2="-20" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="145" y1="-5" x2="145" y2="-20" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="72" y1="-16" x2="98" y2="-16" stroke="rgba(255,255,255,0.25)" stroke-width="0.5"/>
    <line x1="119" y1="-16" x2="145" y2="-16" stroke="rgba(255,255,255,0.25)" stroke-width="0.5"/>
    <polygon points="72,-16 76,-17.5 76,-14.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="145,-16 141,-17.5 141,-14.5" fill="rgba(255,255,255,0.3)"/>
    <text x="108" y="-19" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">35.0</text>

    <!-- BOTTOM: Overall width 145.0mm -->
    <line x1="0" y1="41" x2="0" y2="54" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="290" y1="41" x2="290" y2="54" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="0" y1="50" x2="131" y2="50" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="159" y1="50" x2="290" y2="50" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="0,50 5,48 5,52" fill="rgba(255,255,255,0.4)"/>
    <polygon points="290,50 285,48 285,52" fill="rgba(255,255,255,0.4)"/>
    <text x="145" y="54" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">145.0</text>

    <!-- BOTTOM ROW 2: Web width 9.0 (web 1) -->
    <line x1="101" y1="60" x2="101" y2="70" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="119" y1="60" x2="119" y2="70" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="101" y1="67" x2="119" y2="67" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <text x="110" y="80" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">9.0</text>

    <!-- Web width 9.0 (web 2) -->
    <line x1="171" y1="60" x2="171" y2="70" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="189" y1="60" x2="189" y2="70" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="171" y1="67" x2="189" y2="67" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <text x="180" y="80" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">9.0</text>

    <!-- RIGHT: Overall height 18.0mm -->
    <line x1="296" y1="0" x2="312" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="296" y1="36" x2="312" y2="36" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="308" y1="0" x2="308" y2="12" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="308" y1="24" x2="308" y2="36" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="308,0 306,5 310,5" fill="rgba(255,255,255,0.4)"/>
    <polygon points="308,36 306,31 310,31" fill="rgba(255,255,255,0.4)"/>
    <text x="308" y="21" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">18.0</text>

    <!-- FAR RIGHT: 8.0 top (edge height from top to S-curve start) -->
    <line x1="322" y1="0" x2="340" y2="0" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="322" y1="16" x2="340" y2="16" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="334" y1="0" x2="334" y2="16" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="334,0 332.5,3 335.5,3" fill="rgba(255,255,255,0.3)"/>
    <polygon points="334,16 332.5,13 335.5,13" fill="rgba(255,255,255,0.3)"/>
    <text x="346" y="11" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">8.0</text>

    <!-- FAR RIGHT: 5.0 (web height / channel zone) -->
    <line x1="322" y1="10" x2="340" y2="10" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="322" y1="20" x2="340" y2="20" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="334" y1="10" x2="334" y2="20" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="334,10 332.5,13 335.5,13" fill="rgba(255,255,255,0.3)"/>
    <polygon points="334,20 332.5,17 335.5,17" fill="rgba(255,255,255,0.3)"/>
    <text x="346" y="18" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">5.0</text>

    <!-- FAR RIGHT: 8.0 bottom (bottom plate) -->
    <line x1="322" y1="20" x2="340" y2="20" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="322" y1="36" x2="340" y2="36" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="334" y1="20" x2="334" y2="36" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="334,20 332.5,23 335.5,23" fill="rgba(255,255,255,0.3)"/>
    <polygon points="334,36 332.5,33 335.5,33" fill="rgba(255,255,255,0.3)"/>
    <text x="346" y="31" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">8.0</text>

    <!-- LEFT: 8.0 edge height -->
    <line x1="-6" y1="0" x2="-20" y2="0" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="-6" y1="16" x2="-20" y2="16" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="-16" y1="0" x2="-16" y2="16" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="-16,0 -17.5,3 -14.5,3" fill="rgba(255,255,255,0.3)"/>
    <polygon points="-16,16 -17.5,13 -14.5,13" fill="rgba(255,255,255,0.3)"/>
    <text x="-27" y="11" text-anchor="end" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">8.0</text>

    <!-- R6.5 callout (top-left corner) -->
    <line x1="5" y1="5" x2="-20" y2="-16" stroke="rgba(255,255,255,0.25)" stroke-width="0.5"/>
    <text x="-23" y="-14" text-anchor="end" font-family="-apple-system,sans-serif" font-size="9" font-weight="500" fill="rgba(255,255,255,0.5)">R6.5</text>

    <!-- R6.0 callout (channel bottom curve) -->
    <line x1="55" y1="20" x2="55" y2="40" stroke="rgba(255,255,255,0.25)" stroke-width="0.5"/>
    <text x="55" y="46" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" font-weight="500" fill="rgba(255,255,255,0.5)">R6.0</text>

    <!-- Center axis (dashed) -->
    <line x1="145" y1="-22" x2="145" y2="42" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="8,5"/>
  </g>

  <!-- Unit note -->
  <text x="240" y="196" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="0.04em">All dimensions in mm</text>
</svg>