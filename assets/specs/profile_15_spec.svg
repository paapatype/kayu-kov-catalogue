<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 140" fill="none">
  <!--
    Cladding Profile 58 x 15mm — Cross-Section
    Scale: 2px per mm
    Solid rectangle: 116px x 30px
  -->
  <defs>
    <clipPath id="solidArea">
      <rect x="0" y="0" width="116" height="30"/>
    </clipPath>
    <pattern id="diagHatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#E8833A" stroke-width="0.5" opacity="0.08"/>
    </pattern>
  </defs>

  <g transform="translate(55, 30)">
    <!-- ===== PROFILE CROSS-SECTION ===== -->

    <!-- Solid rectangle — material fill -->
    <rect x="0" y="0" width="116" height="30"
      fill="rgba(196,129,58,0.15)" stroke="#E8833A" stroke-width="1.8" rx="1"/>

    <!-- Diagonal hatching for solid material -->
    <rect x="0" y="0" width="116" height="30" fill="url(#diagHatch)" rx="1"/>

    <!-- Subtle hatching lines -->
    <g clip-path="url(#solidArea)" opacity="0.06" stroke="#E8833A" stroke-width="0.5">
      <line x1="-10" y1="10" x2="10" y2="-10"/><line x1="-10" y1="20" x2="20" y2="-10"/>
      <line x1="-10" y1="30" x2="30" y2="-10"/><line x1="-10" y1="40" x2="40" y2="-10"/>
      <line x1="76" y1="40" x2="126" y2="-10"/><line x1="86" y1="40" x2="126" y2="0"/>
      <line x1="96" y1="40" x2="126" y2="10"/><line x1="106" y1="40" x2="126" y2="20"/>
    </g>

    <!-- ===== DIMENSION LINES ===== -->

    <!-- BOTTOM: Overall width 58mm -->
    <line x1="0" y1="35" x2="0" y2="46" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="116" y1="35" x2="116" y2="46" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="0" y1="43" x2="46" y2="43" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="70" y1="43" x2="116" y2="43" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="0,43 5,41 5,45" fill="rgba(255,255,255,0.4)"/>
    <polygon points="116,43 111,41 111,45" fill="rgba(255,255,255,0.4)"/>
    <text x="58" y="47" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">58</text>

    <!-- RIGHT: Overall height 15mm -->
    <line x1="121" y1="0" x2="132" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="121" y1="30" x2="132" y2="30" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="129" y1="0" x2="129" y2="8" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="129" y1="22" x2="129" y2="30" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="129,0 127,4 131,4" fill="rgba(255,255,255,0.4)"/>
    <polygon points="129,30 127,26 131,26" fill="rgba(255,255,255,0.4)"/>
    <text x="145" y="18" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">15</text>

    <!-- Center axis -->
    <line x1="58" y1="-4" x2="58" y2="34" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="8,5"/>
  </g>

  <!-- Unit note -->
  <text x="140" y="115" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="0.04em">All dimensions in mm</text>
</svg>