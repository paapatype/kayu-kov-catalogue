<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" fill="none">
  <!--
    Hollow Strip Profile 50x25mm — Cross-Section
    Scale: 2px per mm
    Outer: 50x25mm (100x50px)
    Elliptical chamber: 38x15mm (rx=38, ry=15 at 2px/mm)
    Walls: 6mm sides, 5mm top/bottom
  -->

  <g transform="translate(80, 35)">
    <!-- ===== PROFILE CROSS-SECTION ===== -->

    <!-- 1. Outer rectangle -->
    <rect x="0" y="0" width="100" height="50"
      fill="rgba(196,129,58,0.15)" stroke="#E8833A" stroke-width="1.8" rx="1"/>

    <!-- 2. Elliptical chamber void -->
    <ellipse cx="50" cy="25" rx="38" ry="15" fill="#1E2D3D"/>
    <ellipse cx="50" cy="25" rx="38" ry="15" fill="none" stroke="rgba(232,131,58,0.35)" stroke-width="0.8"/>

    <!-- 3. Subtle hatching -->
    <g opacity="0.06" stroke="#E8833A" stroke-width="0.5">
      <line x1="-5" y1="10" x2="10" y2="-5"/><line x1="-5" y1="20" x2="20" y2="-5"/>
      <line x1="-5" y1="30" x2="30" y2="-5"/><line x1="-5" y1="40" x2="40" y2="-5"/>
      <line x1="-5" y1="50" x2="50" y2="-5"/><line x1="-5" y1="60" x2="60" y2="-5"/>
      <line x1="5" y1="60" x2="70" y2="-5"/><line x1="40" y1="60" x2="105" y2="-5"/>
      <line x1="50" y1="60" x2="105" y2="5"/><line x1="60" y1="60" x2="105" y2="15"/>
      <line x1="70" y1="60" x2="105" y2="25"/><line x1="80" y1="60" x2="105" y2="35"/>
    </g>

    <!-- ===== DIMENSION LINES ===== -->

    <!-- BOTTOM: Overall width 50mm -->
    <line x1="0" y1="55" x2="0" y2="66" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="100" y1="55" x2="100" y2="66" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="0" y1="63" x2="38" y2="63" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="62" y1="63" x2="100" y2="63" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="0,63 5,61 5,65" fill="rgba(255,255,255,0.4)"/>
    <polygon points="100,63 95,61 95,65" fill="rgba(255,255,255,0.4)"/>
    <text x="50" y="67" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">50</text>

    <!-- BOTTOM ROW 2: Internal segments 6|38|6 -->
    <line x1="0" y1="75" x2="0" y2="84" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="12" y1="75" x2="12" y2="84" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="0" y1="81" x2="12" y2="81" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="0,81 4,79.5 4,82.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="12,81 8,79.5 8,82.5" fill="rgba(255,255,255,0.3)"/>
    <text x="6" y="94" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">6</text>

    <line x1="12" y1="75" x2="12" y2="84" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="88" y1="75" x2="88" y2="84" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="12" y1="81" x2="40" y2="81" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="60" y1="81" x2="88" y2="81" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="12,81 16,79.5 16,82.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="88,81 84,79.5 84,82.5" fill="rgba(255,255,255,0.3)"/>
    <text x="50" y="94" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">38</text>

    <line x1="88" y1="75" x2="88" y2="84" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="100" y1="75" x2="100" y2="84" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="88" y1="81" x2="100" y2="81" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="88,81 92,79.5 92,82.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="100,81 96,79.5 96,82.5" fill="rgba(255,255,255,0.3)"/>
    <text x="94" y="94" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">6</text>

    <!-- RIGHT: Overall height 25mm -->
    <line x1="105" y1="0" x2="116" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="105" y1="50" x2="116" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="113" y1="0" x2="113" y2="18" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="113" y1="32" x2="113" y2="50" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="113,0 111,5 115,5" fill="rgba(255,255,255,0.4)"/>
    <polygon points="113,50 111,45 115,45" fill="rgba(255,255,255,0.4)"/>
    <text x="113" y="28" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">25</text>

    <!-- FAR RIGHT: Wall heights 5|15|5 -->
    <line x1="128" y1="0" x2="139" y2="0" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="128" y1="10" x2="139" y2="10" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="136" y1="0" x2="136" y2="10" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="136,0 134.5,3 137.5,3" fill="rgba(255,255,255,0.3)"/>
    <polygon points="136,10 134.5,7 137.5,7" fill="rgba(255,255,255,0.3)"/>
    <text x="148" y="8" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">5</text>

    <line x1="128" y1="10" x2="139" y2="10" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="128" y1="40" x2="139" y2="40" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="136" y1="10" x2="136" y2="20" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="136" y1="30" x2="136" y2="40" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="136,10 134.5,13 137.5,13" fill="rgba(255,255,255,0.3)"/>
    <polygon points="136,40 134.5,37 137.5,37" fill="rgba(255,255,255,0.3)"/>
    <text x="148" y="28" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">15</text>

    <line x1="128" y1="40" x2="139" y2="40" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="128" y1="50" x2="139" y2="50" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="136" y1="40" x2="136" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="136,40 134.5,43 137.5,43" fill="rgba(255,255,255,0.3)"/>
    <polygon points="136,50 134.5,47 137.5,47" fill="rgba(255,255,255,0.3)"/>
    <text x="148" y="48" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">5</text>

    <!-- Center axis -->
    <line x1="50" y1="-4" x2="50" y2="54" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="8,5"/>
  </g>

  <!-- Unit note -->
  <text x="160" y="158" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="0.04em">All dimensions in mm</text>
</svg>