<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 170" fill="none">
  <!--
    Hollow Strip Profile 40x20mm — Cross-Section
    Scale: 2px per mm
    Outer: 40x20mm (80x40px)
    Chamber: 24x8mm (48x16px) centered
    Walls: 8mm sides (16px), 6mm top/bottom (12px)
  -->

  <g transform="translate(80, 35)">
    <!-- ===== PROFILE CROSS-SECTION ===== -->

    <!-- 1. Outer rectangle -->
    <rect x="0" y="0" width="80" height="40"
      fill="rgba(196,129,58,0.15)" stroke="#E8833A" stroke-width="1.8" rx="1"/>

    <!-- 2. Chamber void -->
    <rect x="16" y="12" width="48" height="16" fill="#1E2D3D" rx="2"/>
    <rect x="16" y="12" width="48" height="16" fill="none" stroke="rgba(232,131,58,0.35)" stroke-width="0.8" rx="2"/>

    <!-- 3. Subtle hatching -->
    <g opacity="0.06" stroke="#E8833A" stroke-width="0.5">
      <line x1="-5" y1="10" x2="10" y2="-5"/><line x1="-5" y1="20" x2="20" y2="-5"/>
      <line x1="-5" y1="30" x2="30" y2="-5"/><line x1="-5" y1="40" x2="40" y2="-5"/>
      <line x1="-5" y1="50" x2="50" y2="-5"/><line x1="5" y1="50" x2="60" y2="-5"/>
      <line x1="30" y1="50" x2="85" y2="-5"/><line x1="40" y1="50" x2="85" y2="5"/>
      <line x1="50" y1="50" x2="85" y2="15"/><line x1="60" y1="50" x2="85" y2="25"/>
    </g>

    <!-- ===== DIMENSION LINES ===== -->

    <!-- BOTTOM: Overall width 40mm -->
    <line x1="0" y1="45" x2="0" y2="56" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="80" y1="45" x2="80" y2="56" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="0" y1="53" x2="30" y2="53" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="50" y1="53" x2="80" y2="53" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="0,53 5,51 5,55" fill="rgba(255,255,255,0.4)"/>
    <polygon points="80,53 75,51 75,55" fill="rgba(255,255,255,0.4)"/>
    <text x="40" y="57" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">40</text>

    <!-- BOTTOM ROW 2: Internal segments 8|24|8 -->
    <line x1="0" y1="65" x2="0" y2="74" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="16" y1="65" x2="16" y2="74" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="0" y1="71" x2="16" y2="71" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="0,71 4,69.5 4,72.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="16,71 12,69.5 12,72.5" fill="rgba(255,255,255,0.3)"/>
    <text x="8" y="84" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">8</text>

    <line x1="16" y1="65" x2="16" y2="74" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="64" y1="65" x2="64" y2="74" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="16" y1="71" x2="32" y2="71" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="48" y1="71" x2="64" y2="71" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="16,71 20,69.5 20,72.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="64,71 60,69.5 60,72.5" fill="rgba(255,255,255,0.3)"/>
    <text x="40" y="84" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">24</text>

    <line x1="64" y1="65" x2="64" y2="74" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="80" y1="65" x2="80" y2="74" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="64" y1="71" x2="80" y2="71" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="64,71 68,69.5 68,72.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="80,71 76,69.5 76,72.5" fill="rgba(255,255,255,0.3)"/>
    <text x="72" y="84" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">8</text>

    <!-- RIGHT: Overall height 20mm -->
    <line x1="85" y1="0" x2="96" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="85" y1="40" x2="96" y2="40" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="93" y1="0" x2="93" y2="13" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="93" y1="27" x2="93" y2="40" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="93,0 91,5 95,5" fill="rgba(255,255,255,0.4)"/>
    <polygon points="93,40 91,35 95,35" fill="rgba(255,255,255,0.4)"/>
    <text x="93" y="23" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">20</text>

    <!-- FAR RIGHT: Wall heights 6|8|6 -->
    <line x1="108" y1="0" x2="119" y2="0" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="108" y1="12" x2="119" y2="12" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="116" y1="0" x2="116" y2="12" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="116,0 114.5,3 117.5,3" fill="rgba(255,255,255,0.3)"/>
    <polygon points="116,12 114.5,9 117.5,9" fill="rgba(255,255,255,0.3)"/>
    <text x="128" y="9" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">6</text>

    <line x1="108" y1="12" x2="119" y2="12" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="108" y1="28" x2="119" y2="28" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="116" y1="12" x2="116" y2="28" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="116,12 114.5,15 117.5,15" fill="rgba(255,255,255,0.3)"/>
    <polygon points="116,28 114.5,25 117.5,25" fill="rgba(255,255,255,0.3)"/>
    <text x="128" y="23" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">8</text>

    <line x1="108" y1="28" x2="119" y2="28" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="108" y1="40" x2="119" y2="40" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="116" y1="28" x2="116" y2="40" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="116,28 114.5,31 117.5,31" fill="rgba(255,255,255,0.3)"/>
    <polygon points="116,40 114.5,37 117.5,37" fill="rgba(255,255,255,0.3)"/>
    <text x="128" y="37" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">6</text>

    <!-- Center axis -->
    <line x1="40" y1="-4" x2="40" y2="44" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="8,5"/>
  </g>

  <!-- Unit note -->
  <text x="150" y="148" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="0.04em">All dimensions in mm</text>
</svg>