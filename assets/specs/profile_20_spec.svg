<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 200" fill="none">
  <!--
    Door Profile Hollow 100 x 20mm — Cross-Section
    Scale: 2px per mm
    Layout (mm): 6 wall | 39 ch | 10 rib | 39 ch | 6 wall = 100
    Height (mm): 6 top | 8 ch | 6 bottom = 20
  -->

  <g transform="translate(55, 50)">
    <!-- ===== PROFILE CROSS-SECTION ===== -->

    <!-- Outer rectangle — solid material fill -->
    <rect x="0" y="0" width="200" height="40"
      fill="rgba(196,129,58,0.15)" stroke="#E8833A" stroke-width="1.8" rx="1"/>

    <!-- Chamber voids -->
    <!-- Chamber 1: x=12 (6mm wall), w=78 (39mm), y=12 (6mm top), h=16 (8mm) -->
    <rect x="12" y="12" width="78" height="16" fill="#1E2D3D" rx="1"/>
    <!-- Chamber 2: x=110 (12+78+20), w=78 (39mm) -->
    <rect x="110" y="12" width="78" height="16" fill="#1E2D3D" rx="1"/>

    <!-- Chamber outlines -->
    <rect x="12" y="12" width="78" height="16" fill="none" stroke="rgba(232,131,58,0.35)" stroke-width="0.8" rx="1"/>
    <rect x="110" y="12" width="78" height="16" fill="none" stroke="rgba(232,131,58,0.35)" stroke-width="0.8" rx="1"/>

    <!-- Center axis -->
    <line x1="100" y1="-4" x2="100" y2="44" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="8,5"/>

    <!-- ===== DIMENSION LINES ===== -->

    <!-- BOTTOM ROW 1: Overall width 100mm -->
    <line x1="0" y1="45" x2="0" y2="56" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="200" y1="45" x2="200" y2="56" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="0" y1="53" x2="86" y2="53" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="114" y1="53" x2="200" y2="53" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="0,53 5,51 5,55" fill="rgba(255,255,255,0.4)"/>
    <polygon points="200,53 195,51 195,55" fill="rgba(255,255,255,0.4)"/>
    <text x="100" y="57" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">100</text>

    <!-- BOTTOM ROW 2: Internal segments -->
    <!-- 6mm left wall -->
    <line x1="0" y1="67" x2="0" y2="76" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="12" y1="67" x2="12" y2="76" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="0" y1="73" x2="12" y2="73" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="0,73 4,71.5 4,74.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="12,73 8,71.5 8,74.5" fill="rgba(255,255,255,0.3)"/>
    <text x="6" y="86" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">6</text>

    <!-- 39mm chamber 1 -->
    <line x1="90" y1="67" x2="90" y2="76" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="12" y1="73" x2="90" y2="73" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <text x="51" y="86" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">39</text>

    <!-- 10mm center rib -->
    <line x1="110" y1="67" x2="110" y2="76" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="90" y1="73" x2="110" y2="73" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="90,73 94,71.5 94,74.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="110,73 106,71.5 106,74.5" fill="rgba(255,255,255,0.3)"/>
    <text x="100" y="86" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">10</text>

    <!-- 39mm chamber 2 -->
    <line x1="188" y1="67" x2="188" y2="76" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="110" y1="73" x2="188" y2="73" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <text x="149" y="86" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">39</text>

    <!-- 6mm right wall -->
    <line x1="200" y1="67" x2="200" y2="76" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="188" y1="73" x2="200" y2="73" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="188,73 192,71.5 192,74.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="200,73 196,71.5 196,74.5" fill="rgba(255,255,255,0.3)"/>
    <text x="194" y="86" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">6</text>

    <!-- RIGHT: Overall height 20mm -->
    <line x1="205" y1="0" x2="216" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="205" y1="40" x2="216" y2="40" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="213" y1="0" x2="213" y2="13" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="213" y1="27" x2="213" y2="40" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="213,0 211,5 215,5" fill="rgba(255,255,255,0.4)"/>
    <polygon points="213,40 211,35 215,35" fill="rgba(255,255,255,0.4)"/>
    <text x="213" y="23" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">20</text>

    <!-- RIGHT: Wall detail 6|8|6 -->
    <line x1="228" y1="0" x2="239" y2="0" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="228" y1="12" x2="239" y2="12" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="236" y1="0" x2="236" y2="12" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="236,0 234.5,3 237.5,3" fill="rgba(255,255,255,0.3)"/>
    <polygon points="236,12 234.5,9 237.5,9" fill="rgba(255,255,255,0.3)"/>
    <text x="249" y="9" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">6</text>

    <line x1="228" y1="28" x2="239" y2="28" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="228" y1="40" x2="239" y2="40" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="236" y1="28" x2="236" y2="40" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="236,28 234.5,31 237.5,31" fill="rgba(255,255,255,0.3)"/>
    <polygon points="236,40 234.5,37 237.5,37" fill="rgba(255,255,255,0.3)"/>
    <text x="249" y="37" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">6</text>
  </g>

  <!-- Unit note -->
  <text x="190" y="185" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="0.04em">All dimensions in mm</text>
</svg>