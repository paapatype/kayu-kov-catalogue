<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 210" fill="none">
  <!--
    Door Profile 85 x 31mm (Hollow) — Cross-Section
    Scale: 2px per mm
    Layout (mm): 12 wall | 61 chamber | 12 wall = 85
    Height (mm): 6 top | 19 chamber | 6 bottom = 31
  -->

  <g transform="translate(55, 50)">
    <!-- ===== PROFILE CROSS-SECTION ===== -->

    <!-- Outer rectangle — solid material fill -->
    <rect x="0" y="0" width="170" height="62"
      fill="rgba(196,129,58,0.15)" stroke="#E8833A" stroke-width="1.8" rx="1"/>

    <!-- Single chamber void -->
    <rect x="24" y="12" width="122" height="38" fill="#1E2D3D" rx="1"/>

    <!-- Chamber outline -->
    <rect x="24" y="12" width="122" height="38" fill="none" stroke="rgba(232,131,58,0.35)" stroke-width="0.8" rx="1"/>

    <!-- Center axis -->
    <line x1="85" y1="-4" x2="85" y2="66" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="8,5"/>

    <!-- ===== DIMENSION LINES ===== -->

    <!-- BOTTOM ROW 1: Overall width 85mm -->
    <line x1="0" y1="67" x2="0" y2="78" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="170" y1="67" x2="170" y2="78" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="0" y1="75" x2="72" y2="75" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="98" y1="75" x2="170" y2="75" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="0,75 5,73 5,77" fill="rgba(255,255,255,0.4)"/>
    <polygon points="170,75 165,73 165,77" fill="rgba(255,255,255,0.4)"/>
    <text x="85" y="79" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">85</text>

    <!-- BOTTOM ROW 2: Internal segments 12 | 61 | 12 -->
    <!-- 12mm left wall -->
    <line x1="0" y1="89" x2="0" y2="98" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="24" y1="89" x2="24" y2="98" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="0" y1="95" x2="24" y2="95" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="0,95 4,93.5 4,96.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="24,95 20,93.5 20,96.5" fill="rgba(255,255,255,0.3)"/>
    <text x="12" y="108" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">12</text>

    <!-- 61mm chamber -->
    <line x1="146" y1="89" x2="146" y2="98" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="24" y1="95" x2="146" y2="95" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <text x="85" y="108" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">61</text>

    <!-- 12mm right wall -->
    <line x1="170" y1="89" x2="170" y2="98" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="146" y1="95" x2="170" y2="95" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="146,95 150,93.5 150,96.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="170,95 166,93.5 166,96.5" fill="rgba(255,255,255,0.3)"/>
    <text x="158" y="108" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">12</text>

    <!-- RIGHT: Overall height 31mm -->
    <line x1="175" y1="0" x2="186" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="175" y1="62" x2="186" y2="62" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="183" y1="0" x2="183" y2="24" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="183" y1="38" x2="183" y2="62" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="183,0 181,5 185,5" fill="rgba(255,255,255,0.4)"/>
    <polygon points="183,62 181,57 185,57" fill="rgba(255,255,255,0.4)"/>
    <text x="183" y="34" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">31</text>

    <!-- RIGHT detail: 6 | 19 | 6 -->
    <line x1="198" y1="0" x2="209" y2="0" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="198" y1="12" x2="209" y2="12" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="206" y1="0" x2="206" y2="12" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="206,0 204.5,3 207.5,3" fill="rgba(255,255,255,0.3)"/>
    <polygon points="206,12 204.5,9 207.5,9" fill="rgba(255,255,255,0.3)"/>
    <text x="219" y="9" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">6</text>

    <line x1="198" y1="12" x2="209" y2="12" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="198" y1="50" x2="209" y2="50" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="206" y1="12" x2="206" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="206,12 204.5,15 207.5,15" fill="rgba(255,255,255,0.3)"/>
    <polygon points="206,50 204.5,47 207.5,47" fill="rgba(255,255,255,0.3)"/>
    <text x="219" y="34" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">19</text>

    <line x1="198" y1="50" x2="209" y2="50" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="198" y1="62" x2="209" y2="62" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="206" y1="50" x2="206" y2="62" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="206,50 204.5,53 207.5,53" fill="rgba(255,255,255,0.3)"/>
    <polygon points="206,62 204.5,59 207.5,59" fill="rgba(255,255,255,0.3)"/>
    <text x="219" y="59" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">6</text>
  </g>

  <!-- Unit note -->
  <text x="190" y="195" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="0.04em">All dimensions in mm</text>
</svg>