<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 180" fill="none">
  <!--
    Door Profile 100x20x6mm — Cross-Section
    Scale: 2px per mm
    Outer: 100x20mm (200x40px)
    2 rectangular chambers: 6|39|10|39|6 = 100mm width, 6|8|6 = 20mm height
    At 2px/mm: chambers at x=12 w=78, x=110 w=78, y=12 h=16
  -->

  <g transform="translate(80, 40)">
    <!-- ===== PROFILE CROSS-SECTION ===== -->

    <!-- 1. Outer rectangle -->
    <rect x="0" y="0" width="200" height="40"
      fill="rgba(196,129,58,0.15)" stroke="#E8833A" stroke-width="1.8" rx="1"/>

    <!-- 2. Chamber voids -->
    <!-- Chamber 1: x=12 (6mm), w=78 (39mm), y=12 (6mm), h=16 (8mm) -->
    <rect x="12" y="12" width="78" height="16" fill="#1E2D3D" rx="2"/>
    <rect x="12" y="12" width="78" height="16" fill="none" stroke="rgba(232,131,58,0.35)" stroke-width="0.8" rx="2"/>

    <!-- Chamber 2: x=110 (55mm), w=78 (39mm), y=12 (6mm), h=16 (8mm) -->
    <rect x="110" y="12" width="78" height="16" fill="#1E2D3D" rx="2"/>
    <rect x="110" y="12" width="78" height="16" fill="none" stroke="rgba(232,131,58,0.35)" stroke-width="0.8" rx="2"/>

    <!-- 3. Subtle hatching -->
    <g opacity="0.06" stroke="#E8833A" stroke-width="0.5">
      <line x1="-5" y1="10" x2="10" y2="-5"/><line x1="-5" y1="20" x2="20" y2="-5"/>
      <line x1="-5" y1="30" x2="30" y2="-5"/><line x1="-5" y1="40" x2="40" y2="-5"/>
      <line x1="-5" y1="50" x2="50" y2="-5"/><line x1="5" y1="50" x2="60" y2="-5"/>
      <line x1="150" y1="50" x2="210" y2="-5"/><line x1="160" y1="50" x2="210" y2="5"/>
      <line x1="170" y1="50" x2="210" y2="15"/><line x1="180" y1="50" x2="210" y2="25"/>
      <line x1="190" y1="50" x2="210" y2="35"/>
    </g>

    <!-- ===== DIMENSION LINES ===== -->

    <!-- BOTTOM: Overall width 100mm -->
    <line x1="0" y1="45" x2="0" y2="56" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="200" y1="45" x2="200" y2="56" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="0" y1="53" x2="87" y2="53" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="113" y1="53" x2="200" y2="53" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="0,53 5,51 5,55" fill="rgba(255,255,255,0.4)"/>
    <polygon points="200,53 195,51 195,55" fill="rgba(255,255,255,0.4)"/>
    <text x="100" y="57" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">100</text>

    <!-- BOTTOM ROW 2: Internal segments 6|39|10|39|6 -->
    <!-- 6mm left wall -->
    <line x1="0" y1="65" x2="0" y2="74" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="12" y1="65" x2="12" y2="74" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="0" y1="71" x2="12" y2="71" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="0,71 4,69.5 4,72.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="12,71 8,69.5 8,72.5" fill="rgba(255,255,255,0.3)"/>
    <text x="6" y="84" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">6</text>

    <!-- 39mm chamber 1 -->
    <line x1="12" y1="65" x2="12" y2="74" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="90" y1="65" x2="90" y2="74" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="12" y1="71" x2="41" y2="71" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="61" y1="71" x2="90" y2="71" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="12,71 16,69.5 16,72.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="90,71 86,69.5 86,72.5" fill="rgba(255,255,255,0.3)"/>
    <text x="51" y="84" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">39</text>

    <!-- 10mm center rib -->
    <line x1="90" y1="65" x2="90" y2="74" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="110" y1="65" x2="110" y2="74" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="90" y1="71" x2="110" y2="71" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="90,71 94,69.5 94,72.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="110,71 106,69.5 106,72.5" fill="rgba(255,255,255,0.3)"/>
    <text x="100" y="84" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">10</text>

    <!-- 39mm chamber 2 -->
    <line x1="110" y1="65" x2="110" y2="74" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="188" y1="65" x2="188" y2="74" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="110" y1="71" x2="139" y2="71" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="159" y1="71" x2="188" y2="71" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="110,71 114,69.5 114,72.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="188,71 184,69.5 184,72.5" fill="rgba(255,255,255,0.3)"/>
    <text x="149" y="84" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">39</text>

    <!-- 6mm right wall -->
    <line x1="188" y1="65" x2="188" y2="74" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="200" y1="65" x2="200" y2="74" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="188" y1="71" x2="200" y2="71" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="188,71 192,69.5 192,72.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="200,71 196,69.5 196,72.5" fill="rgba(255,255,255,0.3)"/>
    <text x="194" y="84" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">6</text>

    <!-- RIGHT: Overall height 20mm -->
    <line x1="205" y1="0" x2="216" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="205" y1="40" x2="216" y2="40" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="213" y1="0" x2="213" y2="13" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="213" y1="27" x2="213" y2="40" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="213,0 211,5 215,5" fill="rgba(255,255,255,0.4)"/>
    <polygon points="213,40 211,35 215,35" fill="rgba(255,255,255,0.4)"/>
    <text x="213" y="23" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">20</text>

    <!-- FAR RIGHT: Wall thickness 6mm -->
    <line x1="228" y1="0" x2="239" y2="0" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="228" y1="12" x2="239" y2="12" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="236" y1="0" x2="236" y2="12" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="236,0 234.5,3 237.5,3" fill="rgba(255,255,255,0.3)"/>
    <polygon points="236,12 234.5,9 237.5,9" fill="rgba(255,255,255,0.3)"/>
    <text x="248" y="9" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">6</text>

    <!-- Center axis -->
    <line x1="100" y1="-4" x2="100" y2="44" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="8,5"/>
  </g>

  <!-- Unit note -->
  <text x="230" y="158" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="0.04em">All dimensions in mm</text>
</svg>