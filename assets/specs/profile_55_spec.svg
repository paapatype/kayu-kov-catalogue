<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 420" fill="none">
  <!--
    Round Pipe Profile 150 x 10mm — Cross-Section
    Scale: 2px per mm
    Outer circle: diameter 150mm, radius 75mm = 150px
    Inner circle: diameter 130mm, radius 65mm = 130px
    Wall thickness: 10mm = 20px
  -->

  <g transform="translate(230, 180)">
    <!-- ===== PROFILE CROSS-SECTION ===== -->

    <!-- Outer circle (solid material fill) -->
    <circle cx="0" cy="0" r="150"
      fill="rgba(196,129,58,0.15)" stroke="#E8833A" stroke-width="1.8"/>

    <!-- Inner circle (void) -->
    <circle cx="0" cy="0" r="130"
      fill="#1E2D3D" stroke="rgba(232,131,58,0.35)" stroke-width="0.8"/>

    <!-- Inner circle dashed outline (wall boundary) -->
    <circle cx="0" cy="0" r="130"
      fill="none" stroke="rgba(232,131,58,0.3)" stroke-width="0.7" stroke-dasharray="4,3"/>

    <!-- Subtle hatching on solid ring -->
    <g opacity="0.06" stroke="#E8833A" stroke-width="0.5">
      <!-- Top area hatching -->
      <line x1="-150" y1="-145" x2="-130" y2="-155"/><line x1="-120" y1="-145" x2="-100" y2="-155"/>
      <line x1="-60" y1="-145" x2="-40" y2="-155"/><line x1="0" y1="-145" x2="20" y2="-155"/>
      <line x1="60" y1="-145" x2="80" y2="-155"/><line x1="120" y1="-145" x2="140" y2="-155"/>
      <!-- Bottom area hatching -->
      <line x1="-150" y1="145" x2="-130" y2="155"/><line x1="-120" y1="145" x2="-100" y2="155"/>
      <line x1="-60" y1="145" x2="-40" y2="155"/><line x1="0" y1="145" x2="20" y2="155"/>
      <line x1="60" y1="145" x2="80" y2="155"/><line x1="120" y1="145" x2="140" y2="155"/>
      <!-- Left area hatching -->
      <line x1="-155" y1="-60" x2="-145" y2="-40"/><line x1="-155" y1="0" x2="-145" y2="20"/>
      <line x1="-155" y1="60" x2="-145" y2="80"/>
      <!-- Right area hatching -->
      <line x1="145" y1="-60" x2="155" y2="-40"/><line x1="145" y1="0" x2="155" y2="20"/>
      <line x1="145" y1="60" x2="155" y2="80"/>
    </g>

    <!-- ===== DIMENSION LINES ===== -->

    <!-- BOTTOM: Overall diameter 150mm -->
    <line x1="-150" y1="155" x2="-150" y2="172" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="150" y1="155" x2="150" y2="172" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="-150" y1="168" x2="-16" y2="168" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="16" y1="168" x2="150" y2="168" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="-150,168 -145,166 -145,170" fill="rgba(255,255,255,0.4)"/>
    <polygon points="150,168 145,166 145,170" fill="rgba(255,255,255,0.4)"/>
    <text x="0" y="172" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">150</text>

    <!-- Outer diameter label (top) -->
    <line x1="90" y1="-120" x2="120" y2="-155" stroke="rgba(255,255,255,0.25)" stroke-width="0.5"/>
    <circle cx="90" cy="-120" r="1.5" fill="rgba(255,255,255,0.4)"/>
    <text x="122" y="-157" text-anchor="start" font-family="-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">&#x2300;150</text>

    <!-- Inner diameter label -->
    <line x1="80" y1="-100" x2="120" y2="-138" stroke="rgba(255,255,255,0.25)" stroke-width="0.5"/>
    <circle cx="80" cy="-100" r="1.5" fill="rgba(255,255,255,0.4)"/>
    <text x="122" y="-140" text-anchor="start" font-family="-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,0.5)">&#x2300;130</text>

    <!-- Wall thickness 10mm (right side) -->
    <line x1="135" y1="0" x2="135" y2="15" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="155" y1="0" x2="155" y2="15" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="130" y1="8" x2="160" y2="8" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="130,8 134,6.5 134,9.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="160,8 156,6.5 156,9.5" fill="rgba(255,255,255,0.3)"/>
    <text x="165" y="11" text-anchor="start" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">10</text>

    <!-- Center crosshair -->
    <line x1="-8" y1="0" x2="8" y2="0" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
    <line x1="0" y1="-8" x2="0" y2="8" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  </g>

  <!-- Unit note -->
  <text x="230" y="395" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="0.04em">All dimensions in mm</text>
</svg>