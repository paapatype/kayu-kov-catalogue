<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 220" fill="none">
  <!--
    C-Channel Profile 100 x 30 x 6mm — Cross-Section
    Scale: 2px per mm
    Overall: 100mm wide x 30mm tall = 200px x 60px
    Wall thickness: 6mm = 12px
    U-shape: bottom bar 200px wide x 12px, left leg 12px x 60px, right leg 12px x 60px
    Open at top
  -->

  <g transform="translate(130, 40)">
    <!-- ===== PROFILE CROSS-SECTION ===== -->

    <!-- U-shape outline (solid material) -->
    <path d="M0,0 L0,60 L200,60 L200,0 L188,0 L188,48 L12,48 L12,0 Z"
      fill="rgba(196,129,58,0.15)" stroke="#E8833A" stroke-width="1.8" stroke-linejoin="miter"/>

    <!-- Inner void (the space inside the U) -->
    <rect x="12" y="0" width="176" height="48" fill="#1E2D3D"/>
    <rect x="12" y="0" width="176" height="48" fill="none" stroke="rgba(232,131,58,0.35)" stroke-width="0.8"/>

    <!-- Subtle hatching on solid material -->
    <g opacity="0.06" stroke="#E8833A" stroke-width="0.5">
      <!-- Left leg hatching -->
      <line x1="-5" y1="10" x2="10" y2="-5"/><line x1="-5" y1="20" x2="10" y2="5"/>
      <line x1="-5" y1="30" x2="10" y2="15"/><line x1="-5" y1="40" x2="10" y2="25"/>
      <line x1="-5" y1="50" x2="10" y2="35"/><line x1="-5" y1="60" x2="15" y2="45"/>
      <!-- Right leg hatching -->
      <line x1="188" y1="10" x2="205" y2="-5"/><line x1="188" y1="20" x2="205" y2="5"/>
      <line x1="188" y1="30" x2="205" y2="15"/><line x1="188" y1="40" x2="205" y2="25"/>
      <line x1="188" y1="50" x2="205" y2="35"/><line x1="188" y1="60" x2="205" y2="45"/>
      <!-- Bottom bar hatching -->
      <line x1="20" y1="65" x2="35" y2="48"/><line x1="50" y1="65" x2="65" y2="48"/>
      <line x1="80" y1="65" x2="95" y2="48"/><line x1="110" y1="65" x2="125" y2="48"/>
      <line x1="140" y1="65" x2="155" y2="48"/><line x1="170" y1="65" x2="185" y2="48"/>
    </g>

    <!-- ===== DIMENSION LINES ===== -->

    <!-- BOTTOM: Overall width 100mm -->
    <line x1="0" y1="65" x2="0" y2="76" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="200" y1="65" x2="200" y2="76" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="0" y1="73" x2="86" y2="73" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="114" y1="73" x2="200" y2="73" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="0,73 5,71 5,75" fill="rgba(255,255,255,0.4)"/>
    <polygon points="200,73 195,71 195,75" fill="rgba(255,255,255,0.4)"/>
    <text x="100" y="77" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">100</text>

    <!-- LEFT: Overall height 30mm -->
    <line x1="-5" y1="0" x2="-16" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="-5" y1="60" x2="-16" y2="60" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="-13" y1="0" x2="-13" y2="23" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="-13" y1="37" x2="-13" y2="60" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="-13,0 -15,5 -11,5" fill="rgba(255,255,255,0.4)"/>
    <polygon points="-13,60 -15,55 -11,55" fill="rgba(255,255,255,0.4)"/>
    <text x="-13" y="33" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">30</text>

    <!-- TOP: Wall thickness 6mm on left leg -->
    <line x1="0" y1="-5" x2="0" y2="-14" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="12" y1="-5" x2="12" y2="-14" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="0" y1="-11" x2="12" y2="-11" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="0,-11 4,-12.5 4,-9.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="12,-11 8,-12.5 8,-9.5" fill="rgba(255,255,255,0.3)"/>
    <text x="6" y="-15" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">6</text>

    <!-- TOP: Wall thickness 6mm on right leg -->
    <line x1="188" y1="-5" x2="188" y2="-14" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="200" y1="-5" x2="200" y2="-14" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="188" y1="-11" x2="200" y2="-11" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="188,-11 192,-12.5 192,-9.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="200,-11 196,-12.5 196,-9.5" fill="rgba(255,255,255,0.3)"/>
    <text x="194" y="-15" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">6</text>

    <!-- Center axis -->
    <line x1="100" y1="-4" x2="100" y2="64" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="8,5"/>
  </g>

  <!-- Unit note -->
  <text x="230" y="168" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="0.04em">All dimensions in mm</text>
</svg>