<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 260" fill="none">
  <!--
    Railing Profile 65 x 32.5mm — Cross-Section
    Scale: 2px per mm
    Overall: 65mm wide (130px) x 32.5mm tall (65px)
    Top: semicircular dome, radius 32.5mm (65px)
    Bottom: rectangular base
    Wall thickness: 7.5mm (15px)
    Inner slot: 50mm wide (100px)
  -->

  <defs>
    <!-- Clip for outer dome shape -->
    <clipPath id="outerShape">
      <path d="M0,65 L0,32.5 A65,65 0 0,1 130,32.5 L130,65 Z"/>
    </clipPath>
    <clipPath id="innerShape">
      <path d="M15,65 L15,32.5 A50,50 0 0,1 115,32.5 L115,65 Z"/>
    </clipPath>
  </defs>

  <g transform="translate(100, 45)">
    <!-- ===== PROFILE CROSS-SECTION ===== -->

    <!-- Outer shape: flat bottom + semicircle top -->
    <!-- The dome center is at x=65, y=32.5. Radius = 32.5mm = 65px for the semicircle spanning 65mm width -->
    <!-- Actually: overall width 65mm = 130px. Semicircle with diameter = 65mm means radius = 32.5mm = 65px -->
    <!-- The top of the dome is at y=0, center at y=32.5(65px from bottom if height=32.5mm=65px) -->
    <!-- Flat bottom from y=65 to wherever the rect ends, dome from y=0 (top) curving down -->
    <!-- Path: start bottom-left, go up left side, arc over top, down right side, close bottom -->
    <path d="M0,65 L0,32.5 A65,65 0 0,1 130,32.5 L130,65 Z"
      fill="rgba(196,129,58,0.15)" stroke="#E8833A" stroke-width="1.8"/>

    <!-- Inner void: the hollow interior -->
    <!-- Wall thickness 7.5mm = 15px on sides, ~7.5mm on bottom -->
    <!-- Inner width: 65 - 2*7.5 = 50mm = 100px -->
    <!-- Inner starts at x=15, ends at x=115 -->
    <!-- Inner bottom at y=65-15=50... wait, inner height is reduced -->
    <!-- Inner dome: smaller arc, centered same, but radius reduced by wall thickness -->
    <!-- Inner rect bottom: x=15, y=50 to y=65 is wall. Inner void: y from 15 up to inner arc -->
    <!-- Inner arc center at x=65, y=32.5 still, inner radius = 32.5-7.5 = 25mm = 50px -->
    <path d="M15,65 L15,32.5 A50,50 0 0,1 115,32.5 L115,65 Z"
      fill="#1E2D3D"/>

    <!-- Inner void outline -->
    <path d="M15,65 L15,32.5 A50,50 0 0,1 115,32.5 L115,65 Z"
      fill="none" stroke="rgba(232,131,58,0.35)" stroke-width="0.8"/>

    <!-- Subtle hatching on solid material -->
    <g clip-path="url(#outerShape)" opacity="0.06" stroke="#E8833A" stroke-width="0.5">
      <line x1="-10" y1="10" x2="10" y2="-10"/>
      <line x1="-10" y1="20" x2="20" y2="-10"/>
      <line x1="-10" y1="30" x2="30" y2="-10"/>
      <line x1="-10" y1="40" x2="40" y2="-10"/>
      <line x1="-10" y1="50" x2="50" y2="-10"/>
      <line x1="-10" y1="60" x2="60" y2="-10"/>
      <line x1="-10" y1="70" x2="70" y2="-10"/>
      <line x1="0" y1="75" x2="80" y2="-5"/>
      <line x1="10" y1="75" x2="90" y2="-5"/>
      <line x1="70" y1="75" x2="140" y2="5"/>
      <line x1="80" y1="75" x2="140" y2="15"/>
      <line x1="90" y1="75" x2="140" y2="25"/>
      <line x1="100" y1="75" x2="140" y2="35"/>
      <line x1="110" y1="75" x2="140" y2="45"/>
      <line x1="120" y1="75" x2="140" y2="55"/>
    </g>

    <!-- Center axis -->
    <line x1="65" y1="-8" x2="65" y2="72" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="8,5"/>

    <!-- ===== DIMENSION LINES ===== -->

    <!-- BOTTOM: Overall width 65mm -->
    <line x1="0" y1="71" x2="0" y2="82" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="130" y1="71" x2="130" y2="82" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="0" y1="79" x2="52" y2="79" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="78" y1="79" x2="130" y2="79" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="0,79 5,77 5,81" fill="rgba(255,255,255,0.4)"/>
    <polygon points="130,79 125,77 125,81" fill="rgba(255,255,255,0.4)"/>
    <text x="65" y="83" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">65</text>

    <!-- BOTTOM ROW 2: Inner width 50mm -->
    <line x1="15" y1="90" x2="15" y2="99" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="115" y1="90" x2="115" y2="99" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="15" y1="96" x2="52" y2="96" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="78" y1="96" x2="115" y2="96" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="15,96 19,94.5 19,97.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="115,96 111,94.5 111,97.5" fill="rgba(255,255,255,0.3)"/>
    <text x="65" y="100" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">50</text>

    <!-- BOTTOM ROW 2: Wall 7.5mm left -->
    <line x1="0" y1="90" x2="0" y2="99" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="0" y1="96" x2="15" y2="96" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="0,96 4,94.5 4,97.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="15,96 11,94.5 11,97.5" fill="rgba(255,255,255,0.3)"/>
    <text x="7.5" y="110" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">7.5</text>

    <!-- RIGHT: Overall height 32.5mm -->
    <line x1="136" y1="0" x2="147" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="136" y1="65" x2="147" y2="65" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="144" y1="0" x2="144" y2="26" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="144" y1="39" x2="144" y2="65" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="144,0 142,5 146,5" fill="rgba(255,255,255,0.4)"/>
    <polygon points="144,65 142,60 146,60" fill="rgba(255,255,255,0.4)"/>
    <text x="144" y="35" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">32.5</text>
  </g>

  <!-- Unit note -->
  <text x="180" y="210" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="0.04em">All dimensions in mm</text>
</svg>