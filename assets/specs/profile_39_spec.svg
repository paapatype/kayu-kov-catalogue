<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 220" fill="none">
  <!--
    Louver Profile 75 x 20mm (Hollow) — Cross-Section
    Scale: 2px per mm
    Outer ellipse: rx=75px, ry=20px
    Wall: 3mm = 6px; Inner ellipse: rx=69px, ry=14px
    Center circle: Dia 10mm = r=10px
    Vertical bridge: 3mm wide = 6px wide
  -->
  <defs>
    <clipPath id="innerEllipse">
      <ellipse cx="150" cy="40" rx="69" ry="14"/>
    </clipPath>
    <clipPath id="outerEllipse">
      <ellipse cx="150" cy="40" rx="75" ry="20"/>
    </clipPath>
  </defs>

  <g transform="translate(80, 50)">
    <!-- ===== PROFILE CROSS-SECTION ===== -->

    <!-- 1. Outer ellipse (solid material fill) -->
    <ellipse cx="150" cy="40" rx="75" ry="20"
      fill="rgba(196,129,58,0.15)" stroke="#E8833A" stroke-width="1.8"/>

    <!-- 2. Inner ellipse void -->
    <ellipse cx="150" cy="40" rx="69" ry="14" fill="#1E2D3D"/>

    <!-- 3. Center circle (solid material) -->
    <circle cx="150" cy="40" r="10"
      fill="rgba(196,129,58,0.15)" stroke="#E8833A" stroke-width="1"/>

    <!-- 4. Vertical bridge connecting circle to outer wall, clipped to inner ellipse -->
    <g clip-path="url(#innerEllipse)">
      <rect x="147" y="0" width="6" height="80"
        fill="rgba(196,129,58,0.15)" stroke="#E8833A" stroke-width="0.8"/>
    </g>

    <!-- 5. Inner ellipse outline (wall boundary) -->
    <ellipse cx="150" cy="40" rx="69" ry="14"
      fill="none" stroke="rgba(232,131,58,0.3)" stroke-width="0.7" stroke-dasharray="4,3"/>

    <!-- 6. Subtle hatching on solid material -->
    <g clip-path="url(#outerEllipse)" opacity="0.06" stroke="#E8833A" stroke-width="0.5">
      <line x1="60" y1="60" x2="80" y2="20"/><line x1="70" y1="60" x2="90" y2="20"/>
      <line x1="80" y1="60" x2="100" y2="20"/><line x1="200" y1="60" x2="220" y2="20"/>
      <line x1="210" y1="60" x2="230" y2="20"/><line x1="220" y1="60" x2="240" y2="20"/>
    </g>

    <!-- ===== DIMENSION LINES ===== -->

    <!-- BOTTOM: Overall width 75mm -->
    <line x1="75" y1="64" x2="75" y2="76" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="225" y1="64" x2="225" y2="76" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="75" y1="73" x2="138" y2="73" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="162" y1="73" x2="225" y2="73" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="75,73 80,71 80,75" fill="rgba(255,255,255,0.4)"/>
    <polygon points="225,73 220,71 220,75" fill="rgba(255,255,255,0.4)"/>
    <text x="150" y="77" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">75</text>

    <!-- RIGHT: Overall height 20mm -->
    <line x1="230" y1="20" x2="241" y2="20" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="230" y1="60" x2="241" y2="60" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="238" y1="20" x2="238" y2="33" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="238" y1="47" x2="238" y2="60" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="238,20 236,25 240,25" fill="rgba(255,255,255,0.4)"/>
    <polygon points="238,60 236,55 240,55" fill="rgba(255,255,255,0.4)"/>
    <text x="238" y="43" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">20</text>

    <!-- Wall thickness 3mm (top right area) -->
    <line x1="253" y1="20" x2="264" y2="20" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="253" y1="26" x2="264" y2="26" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="261" y1="20" x2="261" y2="26" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="261,20 259.5,23 262.5,23" fill="rgba(255,255,255,0.3)"/>
    <polygon points="261,26 259.5,23 262.5,23" fill="rgba(255,255,255,0.3)"/>
    <text x="272" y="26" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">3</text>

    <!-- Center circle diameter annotation -->
    <line x1="157" y1="33" x2="180" y2="18" stroke="rgba(255,255,255,0.25)" stroke-width="0.5"/>
    <circle cx="157" cy="33" r="1.5" fill="rgba(255,255,255,0.4)"/>
    <text x="182" y="21" text-anchor="start" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">Dia. 10</text>

    <!-- Center axis -->
    <line x1="150" y1="16" x2="150" y2="64" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="8,5"/>
  </g>

  <!-- Unit note -->
  <text x="230" y="168" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="0.04em">All dimensions in mm</text>
</svg>