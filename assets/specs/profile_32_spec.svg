<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 130" fill="none">
  <!--
    Strip Profile 80 x 11mm — Cross-Section
    Scale: 2px per mm
    Rectangle: 160px wide x 22px tall
  -->
  <defs>
    <clipPath id="rectClip">
      <rect x="55" y="30" width="160" height="22"/>
    </clipPath>
  </defs>

  <g>
    <!-- ===== PROFILE CROSS-SECTION ===== -->

    <!-- Solid rectangle -->
    <rect x="55" y="30" width="160" height="22"
      fill="rgba(196,129,58,0.15)" stroke="#E8833A" stroke-width="1.8"/>

    <!-- Subtle diagonal hatching on solid material -->
    <g clip-path="url(#rectClip)" opacity="0.06" stroke="#E8833A" stroke-width="0.5">
      <line x1="55" y1="40" x2="65" y2="30"/>
      <line x1="55" y1="52" x2="77" y2="30"/>
      <line x1="67" y1="52" x2="89" y2="30"/>
      <line x1="79" y1="52" x2="101" y2="30"/>
      <line x1="91" y1="52" x2="113" y2="30"/>
      <line x1="103" y1="52" x2="125" y2="30"/>
      <line x1="115" y1="52" x2="137" y2="30"/>
      <line x1="127" y1="52" x2="149" y2="30"/>
      <line x1="139" y1="52" x2="161" y2="30"/>
      <line x1="151" y1="52" x2="173" y2="30"/>
      <line x1="163" y1="52" x2="185" y2="30"/>
      <line x1="175" y1="52" x2="197" y2="30"/>
      <line x1="187" y1="52" x2="209" y2="30"/>
      <line x1="199" y1="52" x2="215" y2="36"/>
      <line x1="205" y1="52" x2="215" y2="42"/>
    </g>

    <!-- ===== DIMENSION LINES ===== -->

    <!-- BOTTOM: Overall width 80mm -->
    <line x1="55" y1="57" x2="55" y2="68" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="215" y1="57" x2="215" y2="68" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="55" y1="65" x2="121" y2="65" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="149" y1="65" x2="215" y2="65" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="55,65 60,63 60,67" fill="rgba(255,255,255,0.4)"/>
    <polygon points="215,65 210,63 210,67" fill="rgba(255,255,255,0.4)"/>
    <text x="135" y="69" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">80</text>

    <!-- RIGHT: Overall height 11mm -->
    <line x1="220" y1="30" x2="231" y2="30" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="220" y1="52" x2="231" y2="52" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="228" y1="30" x2="228" y2="34" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="228" y1="48" x2="228" y2="52" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="228,30 226,35 230,35" fill="rgba(255,255,255,0.4)"/>
    <polygon points="228,52 226,47 230,47" fill="rgba(255,255,255,0.4)"/>
    <text x="247" y="45" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">11</text>

    <!-- Center axis -->
    <line x1="135" y1="26" x2="135" y2="56" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="8,5"/>
  </g>

  <!-- Unit note -->
  <text x="155" y="102" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="0.04em">All dimensions in mm</text>
</svg>