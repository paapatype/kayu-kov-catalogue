<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 220" fill="none">
  <!--
    Louver Profile 150 x 35mm — Cross-Section
    Scale: 2px per mm
    Ribs layout (mm): 10 end | ch1 | 6 rib | ch2 | 12 center | ch3 | 6 rib | ch4 | 10 end
    Chamber width: (150 - 10 - 6 - 12 - 6 - 10) / 4 = 26.5mm each
  -->
  <defs>
    <!-- Clip chambers to inner ellipse boundary -->
    <clipPath id="innerEllipse">
      <ellipse cx="150" cy="35" rx="140" ry="25"/>
    </clipPath>
    <clipPath id="outerEllipse">
      <ellipse cx="150" cy="35" rx="150" ry="35"/>
    </clipPath>
  </defs>

  <g transform="translate(55, 40)">
    <!-- ===== PROFILE CROSS-SECTION ===== -->

    <!-- 1. Outer ellipse = solid material fill -->
    <ellipse cx="150" cy="35" rx="150" ry="35"
      fill="rgba(196,129,58,0.15)" stroke="#E8833A" stroke-width="1.8"/>

    <!-- 2. Chamber voids clipped to inner ellipse (these follow the curve) -->
    <g clip-path="url(#innerEllipse)">
      <!-- Chamber 1: 10mm to 36.5mm = x:20 to x:73 -->
      <rect x="20" y="0" width="53" height="70" fill="#1E2D3D" rx="2"/>
      <!-- Chamber 2: 42.5mm to 69mm = x:85 to x:138 -->
      <rect x="85" y="0" width="53" height="70" fill="#1E2D3D" rx="2"/>
      <!-- Chamber 3: 81mm to 107.5mm = x:162 to x:215 -->
      <rect x="162" y="0" width="53" height="70" fill="#1E2D3D" rx="2"/>
      <!-- Chamber 4: 113.5mm to 140mm = x:227 to x:280 -->
      <rect x="227" y="0" width="53" height="70" fill="#1E2D3D" rx="2"/>
    </g>

    <!-- 3. Chamber outlines clipped to inner ellipse (stroked edges) -->
    <g clip-path="url(#innerEllipse)">
      <rect x="20" y="0" width="53" height="70" fill="none" stroke="rgba(232,131,58,0.35)" stroke-width="0.8" rx="2"/>
      <rect x="85" y="0" width="53" height="70" fill="none" stroke="rgba(232,131,58,0.35)" stroke-width="0.8" rx="2"/>
      <rect x="162" y="0" width="53" height="70" fill="none" stroke="rgba(232,131,58,0.35)" stroke-width="0.8" rx="2"/>
      <rect x="227" y="0" width="53" height="70" fill="none" stroke="rgba(232,131,58,0.35)" stroke-width="0.8" rx="2"/>
    </g>

    <!-- 4. Inner ellipse outline (wall boundary) -->
    <ellipse cx="150" cy="35" rx="140" ry="25"
      fill="none" stroke="rgba(232,131,58,0.3)" stroke-width="0.7" stroke-dasharray="4,3"/>

    <!-- 5. Subtle hatching on solid material only (clipped to outer, chambers already cut) -->
    <g clip-path="url(#outerEllipse)" opacity="0.06" stroke="#E8833A" stroke-width="0.5">
      <!-- Diagonal hatch lines across full area -->
      <line x1="-10" y1="10" x2="10" y2="-10"/><line x1="-10" y1="20" x2="20" y2="-10"/>
      <line x1="-10" y1="30" x2="30" y2="-10"/><line x1="-10" y1="40" x2="40" y2="-10"/>
      <line x1="-10" y1="50" x2="50" y2="-10"/><line x1="-10" y1="60" x2="60" y2="-10"/>
      <line x1="-10" y1="70" x2="70" y2="-10"/><line x1="-10" y1="80" x2="80" y2="-10"/>
      <line x1="0" y1="80" x2="90" y2="-10"/><line x1="10" y1="80" x2="100" y2="-10"/>
      <line x1="240" y1="80" x2="310" y2="10"/><line x1="250" y1="80" x2="310" y2="20"/>
      <line x1="260" y1="80" x2="310" y2="30"/><line x1="270" y1="80" x2="310" y2="40"/>
      <line x1="280" y1="80" x2="310" y2="50"/><line x1="290" y1="80" x2="310" y2="60"/>
      <line x1="300" y1="80" x2="310" y2="70"/>
    </g>

    <!-- ===== DIMENSION LINES ===== -->

    <!-- BOTTOM ROW 1: Overall width 150mm -->
    <line x1="0" y1="75" x2="0" y2="86" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="300" y1="75" x2="300" y2="86" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="0" y1="83" x2="136" y2="83" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="164" y1="83" x2="300" y2="83" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="0,83 5,81 5,85" fill="rgba(255,255,255,0.4)"/>
    <polygon points="300,83 295,81 295,85" fill="rgba(255,255,255,0.4)"/>
    <text x="150" y="87" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">150</text>

    <!-- BOTTOM ROW 2: Internal segments -->
    <!-- 10mm left end wall -->
    <line x1="0" y1="97" x2="0" y2="106" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="20" y1="97" x2="20" y2="106" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="0" y1="103" x2="20" y2="103" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="0,103 4,101.5 4,104.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="20,103 16,101.5 16,104.5" fill="rgba(255,255,255,0.3)"/>
    <text x="10" y="116" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">10</text>

    <!-- 6mm rib left -->
    <line x1="73" y1="97" x2="73" y2="106" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="85" y1="97" x2="85" y2="106" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="73" y1="103" x2="85" y2="103" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <text x="79" y="116" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">6</text>

    <!-- 12mm center rib -->
    <line x1="138" y1="97" x2="138" y2="106" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="162" y1="97" x2="162" y2="106" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="138" y1="103" x2="162" y2="103" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="138,103 142,101.5 142,104.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="162,103 158,101.5 158,104.5" fill="rgba(255,255,255,0.3)"/>
    <text x="150" y="116" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">12</text>

    <!-- 6mm rib right -->
    <line x1="215" y1="97" x2="215" y2="106" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="227" y1="97" x2="227" y2="106" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="215" y1="103" x2="227" y2="103" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <text x="221" y="116" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">6</text>

    <!-- 10mm right end wall -->
    <line x1="280" y1="97" x2="280" y2="106" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="300" y1="97" x2="300" y2="106" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="280" y1="103" x2="300" y2="103" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="280,103 284,101.5 284,104.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="300,103 296,101.5 296,104.5" fill="rgba(255,255,255,0.3)"/>
    <text x="290" y="116" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">10</text>

    <!-- RIGHT: Overall height 35mm -->
    <line x1="305" y1="0" x2="316" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="305" y1="70" x2="316" y2="70" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="313" y1="0" x2="313" y2="28" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="313" y1="42" x2="313" y2="70" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="313,0 311,5 315,5" fill="rgba(255,255,255,0.4)"/>
    <polygon points="313,70 311,65 315,65" fill="rgba(255,255,255,0.4)"/>
    <text x="313" y="38" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">35</text>

    <!-- RIGHT: Wall thickness 5mm -->
    <line x1="328" y1="0" x2="339" y2="0" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="328" y1="10" x2="339" y2="10" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="336" y1="0" x2="336" y2="10" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="336,0 334.5,3 337.5,3" fill="rgba(255,255,255,0.3)"/>
    <polygon points="336,10 334.5,7 337.5,7" fill="rgba(255,255,255,0.3)"/>
    <text x="349" y="8" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">5</text>

    <!-- Center axis -->
    <line x1="150" y1="-4" x2="150" y2="74" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="8,5"/>
  </g>

  <!-- Unit note -->
  <text x="205" y="178" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="0.04em">All dimensions in mm</text>
</svg>