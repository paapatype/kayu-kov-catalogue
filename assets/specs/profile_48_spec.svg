<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 220" fill="none">
  <!--
    Square Box Profile 50 x 50 x 6mm — Cross-Section
    Scale: 2px per mm
    Outer: 100x100px, Wall: 12px, Inner void: 76x76px
  -->
  <defs>
    <clipPath id="solidArea">
      <rect x="0" y="0" width="100" height="100"/>
    </clipPath>
  </defs>

  <g transform="translate(60, 30)">
    <!-- ===== PROFILE CROSS-SECTION ===== -->

    <!-- Outer square — solid material fill -->
    <rect x="0" y="0" width="100" height="100"
      fill="rgba(196,129,58,0.15)" stroke="#E8833A" stroke-width="1.8" rx="1"/>

    <!-- Inner void -->
    <rect x="12" y="12" width="76" height="76"
      fill="#1E2D3D" stroke="rgba(232,131,58,0.35)" stroke-width="0.8" rx="1"/>

    <!-- Subtle hatching on solid material -->
    <g clip-path="url(#solidArea)" opacity="0.06" stroke="#E8833A" stroke-width="0.5">
      <line x1="-10" y1="10" x2="10" y2="-10"/><line x1="-10" y1="20" x2="20" y2="-10"/>
      <line x1="-10" y1="30" x2="30" y2="-10"/><line x1="-10" y1="40" x2="40" y2="-10"/>
      <line x1="-10" y1="50" x2="50" y2="-10"/><line x1="-10" y1="60" x2="60" y2="-10"/>
      <line x1="-10" y1="70" x2="70" y2="-10"/><line x1="-10" y1="80" x2="80" y2="-10"/>
      <line x1="-10" y1="90" x2="90" y2="-10"/><line x1="-10" y1="100" x2="100" y2="-10"/>
      <line x1="-10" y1="110" x2="110" y2="-10"/><line x1="0" y1="110" x2="110" y2="0"/>
      <line x1="10" y1="110" x2="110" y2="10"/><line x1="20" y1="110" x2="110" y2="20"/>
      <line x1="30" y1="110" x2="110" y2="30"/><line x1="40" y1="110" x2="110" y2="40"/>
      <line x1="50" y1="110" x2="110" y2="50"/><line x1="60" y1="110" x2="110" y2="60"/>
      <line x1="70" y1="110" x2="110" y2="70"/><line x1="80" y1="110" x2="110" y2="80"/>
    </g>

    <!-- ===== DIMENSION LINES ===== -->

    <!-- BOTTOM: Overall width 50mm -->
    <line x1="0" y1="105" x2="0" y2="116" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="100" y1="105" x2="100" y2="116" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="0" y1="113" x2="40" y2="113" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="60" y1="113" x2="100" y2="113" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="0,113 5,111 5,115" fill="rgba(255,255,255,0.4)"/>
    <polygon points="100,113 95,111 95,115" fill="rgba(255,255,255,0.4)"/>
    <text x="50" y="117" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">50</text>

    <!-- RIGHT: Overall height 50mm -->
    <line x1="105" y1="0" x2="116" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="105" y1="100" x2="116" y2="100" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="113" y1="0" x2="113" y2="40" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="113" y1="60" x2="113" y2="100" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="113,0 111,5 115,5" fill="rgba(255,255,255,0.4)"/>
    <polygon points="113,100 111,95 115,95" fill="rgba(255,255,255,0.4)"/>
    <text x="113" y="53" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">50</text>

    <!-- RIGHT: Wall thickness 6mm -->
    <line x1="128" y1="0" x2="139" y2="0" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="128" y1="12" x2="139" y2="12" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="136" y1="0" x2="136" y2="12" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="136,0 134.5,3 137.5,3" fill="rgba(255,255,255,0.3)"/>
    <polygon points="136,12 134.5,9 137.5,9" fill="rgba(255,255,255,0.3)"/>
    <text x="149" y="9" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">6</text>

    <!-- Center axis -->
    <line x1="50" y1="-4" x2="50" y2="104" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="8,5"/>
  </g>

  <!-- Unit note -->
  <text x="140" y="195" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="0.04em">All dimensions in mm</text>
</svg>