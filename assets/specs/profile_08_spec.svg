<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" fill="none">
  <!--
    Strip Profile 50 x 25mm — Cross-Section
    Scale: 2px per mm
    Rectangle: 100px wide x 50px tall
  -->
  <defs>
    <clipPath id="rectClip">
      <rect x="50" y="30" width="100" height="50"/>
    </clipPath>
  </defs>

  <g>
    <!-- ===== PROFILE CROSS-SECTION ===== -->

    <!-- Solid rectangle -->
    <rect x="50" y="30" width="100" height="50"
      fill="rgba(196,129,58,0.15)" stroke="#E8833A" stroke-width="1.8"/>

    <!-- Subtle diagonal hatching on solid material -->
    <g clip-path="url(#rectClip)" opacity="0.06" stroke="#E8833A" stroke-width="0.5">
      <line x1="50" y1="40" x2="60" y2="30"/>
      <line x1="50" y1="50" x2="70" y2="30"/>
      <line x1="50" y1="60" x2="80" y2="30"/>
      <line x1="50" y1="70" x2="90" y2="30"/>
      <line x1="50" y1="80" x2="100" y2="30"/>
      <line x1="60" y1="80" x2="110" y2="30"/>
      <line x1="70" y1="80" x2="120" y2="30"/>
      <line x1="80" y1="80" x2="130" y2="30"/>
      <line x1="90" y1="80" x2="140" y2="30"/>
      <line x1="100" y1="80" x2="150" y2="30"/>
      <line x1="110" y1="80" x2="150" y2="40"/>
      <line x1="120" y1="80" x2="150" y2="50"/>
      <line x1="130" y1="80" x2="150" y2="60"/>
      <line x1="140" y1="80" x2="150" y2="70"/>
    </g>

    <!-- ===== DIMENSION LINES ===== -->

    <!-- BOTTOM: Overall width 50mm -->
    <line x1="50" y1="85" x2="50" y2="96" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="150" y1="85" x2="150" y2="96" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="50" y1="93" x2="86" y2="93" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="114" y1="93" x2="150" y2="93" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="50,93 55,91 55,95" fill="rgba(255,255,255,0.4)"/>
    <polygon points="150,93 145,91 145,95" fill="rgba(255,255,255,0.4)"/>
    <text x="100" y="97" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">50</text>

    <!-- RIGHT: Overall height 25mm -->
    <line x1="155" y1="30" x2="166" y2="30" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="155" y1="80" x2="166" y2="80" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="163" y1="30" x2="163" y2="48" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="163" y1="62" x2="163" y2="80" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="163,30 161,35 165,35" fill="rgba(255,255,255,0.4)"/>
    <polygon points="163,80 161,75 165,75" fill="rgba(255,255,255,0.4)"/>
    <text x="163" y="58" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">25</text>

    <!-- Center axis -->
    <line x1="100" y1="26" x2="100" y2="84" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="8,5"/>
  </g>

  <!-- Unit note -->
  <text x="120" y="130" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="0.04em">All dimensions in mm</text>
</svg>