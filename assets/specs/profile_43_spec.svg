<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 260" fill="none">
  <!--
    C-Channel Profile 84 x 30 x 6mm (Rounded) — Cross-Section
    Scale: 2px per mm
    Overall: 84mm wide x 30mm tall = 168px x 60px
    Wall thickness: 6mm = 12px
    Top lip inward curve: R10 outer = 20px
    Bottom corners: R4 outer = 8px
    Top opening: 18mm = 36px
    Inner width at bottom: 64mm = 128px (accounts for radii)
    Inner depth: 52mm shown as annotation
  -->

  <g transform="translate(146, 50)">
    <!-- ===== PROFILE CROSS-SECTION ===== -->

    <!--
      Outer path (clockwise from left lip tip):
      Left lip tip at (66,0), horizontal left to (20,0),
      arc R20 curving down to (0,20), straight down to (0,52),
      arc R8 bottom-left to (8,60), straight across to (160,60),
      arc R8 bottom-right to (168,52), straight up to (168,20),
      arc R20 curving left to (148,0), horizontal left to (102,0)
    -->
    <path d="
      M66,0 L20,0
      A20,20 0 0,1 0,20
      L0,52
      A8,8 0 0,0 8,60
      L160,60
      A8,8 0 0,0 168,52
      L168,20
      A20,20 0 0,1 148,0
      L102,0
    " fill="rgba(196,129,58,0.15)" stroke="#E8833A" stroke-width="1.8" stroke-linejoin="round"/>

    <!-- Inner void -->
    <path d="
      M66,12 L28,12
      A8,8 0 0,1 20,20
      L12,20
      L12,48
      L156,48
      L156,20
      L148,20
      A8,8 0 0,1 140,12
      L102,12
    " fill="#1E2D3D" stroke="rgba(232,131,58,0.35)" stroke-width="0.8"/>

    <!-- Subtle hatching on solid material -->
    <g opacity="0.06" stroke="#E8833A" stroke-width="0.5">
      <line x1="-5" y1="30" x2="10" y2="15"/><line x1="-5" y1="40" x2="10" y2="25"/>
      <line x1="-5" y1="50" x2="10" y2="35"/><line x1="-5" y1="60" x2="15" y2="45"/>
      <line x1="158" y1="30" x2="173" y2="15"/><line x1="158" y1="40" x2="173" y2="25"/>
      <line x1="158" y1="50" x2="173" y2="35"/><line x1="158" y1="60" x2="173" y2="45"/>
      <line x1="20" y1="60" x2="35" y2="45"/><line x1="60" y1="60" x2="75" y2="45"/>
      <line x1="100" y1="60" x2="115" y2="45"/><line x1="140" y1="60" x2="155" y2="45"/>
    </g>

    <!-- ===== DIMENSION LINES ===== -->

    <!-- BOTTOM: Overall width 84mm -->
    <line x1="0" y1="65" x2="0" y2="76" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="168" y1="65" x2="168" y2="76" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="0" y1="73" x2="72" y2="73" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="96" y1="73" x2="168" y2="73" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="0,73 5,71 5,75" fill="rgba(255,255,255,0.4)"/>
    <polygon points="168,73 163,71 163,75" fill="rgba(255,255,255,0.4)"/>
    <text x="84" y="77" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">84</text>

    <!-- RIGHT: Overall height 30mm -->
    <line x1="173" y1="0" x2="184" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="173" y1="60" x2="184" y2="60" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="181" y1="0" x2="181" y2="23" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="181" y1="37" x2="181" y2="60" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="181,0 179,5 183,5" fill="rgba(255,255,255,0.4)"/>
    <polygon points="181,60 179,55 183,55" fill="rgba(255,255,255,0.4)"/>
    <text x="181" y="33" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">30</text>

    <!-- Wall thickness 6mm (leader from bottom wall) -->
    <line x1="30" y1="51" x2="42" y2="65" stroke="rgba(255,255,255,0.25)" stroke-width="0.5"/>
    <circle cx="30" cy="51" r="1.5" fill="rgba(255,255,255,0.4)"/>
    <text x="44" y="68" text-anchor="start" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">6</text>

    <!-- R10 label (top lip curve) -->
    <line x1="10" y1="10" x2="-15" y2="-8" stroke="rgba(255,255,255,0.25)" stroke-width="0.5"/>
    <circle cx="10" cy="10" r="1.5" fill="rgba(255,255,255,0.4)"/>
    <text x="-17" y="-10" text-anchor="end" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">R10</text>

    <!-- R4 label (bottom corner) -->
    <line x1="4" y1="56" x2="-15" y2="68" stroke="rgba(255,255,255,0.25)" stroke-width="0.5"/>
    <circle cx="4" cy="56" r="1.5" fill="rgba(255,255,255,0.4)"/>
    <text x="-17" y="72" text-anchor="end" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">R4</text>

    <!-- Top opening 18mm -->
    <line x1="66" y1="-5" x2="66" y2="-14" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="102" y1="-5" x2="102" y2="-14" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="66" y1="-11" x2="78" y2="-11" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="90" y1="-11" x2="102" y2="-11" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="66,-11 70,-12.5 70,-9.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="102,-11 98,-12.5 98,-9.5" fill="rgba(255,255,255,0.3)"/>
    <text x="84" y="-14" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">18</text>

    <!-- Inner depth 52 (right side secondary) -->
    <line x1="196" y1="12" x2="207" y2="12" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="196" y1="48" x2="207" y2="48" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="204" y1="12" x2="204" y2="24" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="204" y1="36" x2="204" y2="48" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="204,12 202,16 206,16" fill="rgba(255,255,255,0.3)"/>
    <polygon points="204,48 202,44 206,44" fill="rgba(255,255,255,0.3)"/>
    <text x="215" y="33" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">52</text>

    <!-- Inner bottom width 64mm -->
    <line x1="12" y1="85" x2="12" y2="94" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="156" y1="85" x2="156" y2="94" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="12" y1="91" x2="72" y2="91" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="96" y1="91" x2="156" y2="91" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="12,91 16,89.5 16,92.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="156,91 152,89.5 152,92.5" fill="rgba(255,255,255,0.3)"/>
    <text x="84" y="95" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">64</text>

    <!-- Lip inward extent 10mm -->
    <line x1="0" y1="-20" x2="0" y2="-29" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="20" y1="-20" x2="20" y2="-29" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
    <line x1="0" y1="-26" x2="20" y2="-26" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <polygon points="0,-26 4,-27.5 4,-24.5" fill="rgba(255,255,255,0.3)"/>
    <polygon points="20,-26 16,-27.5 16,-24.5" fill="rgba(255,255,255,0.3)"/>
    <text x="10" y="-29" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">10</text>

    <!-- Center axis -->
    <line x1="84" y1="-4" x2="84" y2="64" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="8,5"/>
  </g>

  <!-- Unit note -->
  <text x="230" y="205" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="0.04em">All dimensions in mm</text>
</svg>