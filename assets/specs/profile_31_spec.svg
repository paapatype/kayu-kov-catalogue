<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 130" fill="none">
  <!--
    Strip Profile 55 x 10mm — Cross-Section
    Scale: 2px per mm
    Rectangle: 110px wide x 20px tall
  -->
  <defs>
    <clipPath id="rectClip">
      <rect x="55" y="30" width="110" height="20"/>
    </clipPath>
  </defs>

  <g>
    <!-- ===== PROFILE CROSS-SECTION ===== -->

    <!-- Solid rectangle -->
    <rect x="55" y="30" width="110" height="20"
      fill="rgba(196,129,58,0.15)" stroke="#E8833A" stroke-width="1.8"/>

    <!-- Subtle diagonal hatching on solid material -->
    <g clip-path="url(#rectClip)" opacity="0.06" stroke="#E8833A" stroke-width="0.5">
      <line x1="55" y1="40" x2="65" y2="30"/>
      <line x1="55" y1="50" x2="75" y2="30"/>
      <line x1="65" y1="50" x2="85" y2="30"/>
      <line x1="75" y1="50" x2="95" y2="30"/>
      <line x1="85" y1="50" x2="105" y2="30"/>
      <line x1="95" y1="50" x2="115" y2="30"/>
      <line x1="105" y1="50" x2="125" y2="30"/>
      <line x1="115" y1="50" x2="135" y2="30"/>
      <line x1="125" y1="50" x2="145" y2="30"/>
      <line x1="135" y1="50" x2="155" y2="30"/>
      <line x1="145" y1="50" x2="165" y2="30"/>
      <line x1="155" y1="50" x2="165" y2="40"/>
    </g>

    <!-- ===== DIMENSION LINES ===== -->

    <!-- BOTTOM: Overall width 55mm -->
    <line x1="55" y1="55" x2="55" y2="66" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="165" y1="55" x2="165" y2="66" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="55" y1="63" x2="96" y2="63" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="124" y1="63" x2="165" y2="63" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="55,63 60,61 60,65" fill="rgba(255,255,255,0.4)"/>
    <polygon points="165,63 160,61 160,65" fill="rgba(255,255,255,0.4)"/>
    <text x="110" y="67" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">55</text>

    <!-- RIGHT: Overall height 10mm -->
    <line x1="170" y1="30" x2="181" y2="30" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="170" y1="50" x2="181" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="178" y1="30" x2="178" y2="33" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="178" y1="47" x2="178" y2="50" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="178,30 176,35 180,35" fill="rgba(255,255,255,0.4)"/>
    <polygon points="178,50 176,45 180,45" fill="rgba(255,255,255,0.4)"/>
    <text x="195" y="44" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">10</text>

    <!-- Center axis -->
    <line x1="110" y1="26" x2="110" y2="54" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="8,5"/>
  </g>

  <!-- Unit note -->
  <text x="130" y="100" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="0.04em">All dimensions in mm</text>
</svg>