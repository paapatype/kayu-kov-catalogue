<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 120" fill="none">
  <!--
    Strip Profile 80 x 6mm — Cross-Section
    Scale: 2px per mm
    Rectangle: 160px wide x 12px tall
  -->
  <defs>
    <clipPath id="rectClip">
      <rect x="55" y="30" width="160" height="12"/>
    </clipPath>
  </defs>

  <g>
    <!-- ===== PROFILE CROSS-SECTION ===== -->

    <!-- Solid rectangle -->
    <rect x="55" y="30" width="160" height="12"
      fill="rgba(196,129,58,0.15)" stroke="#E8833A" stroke-width="1.8"/>

    <!-- Subtle diagonal hatching on solid material -->
    <g clip-path="url(#rectClip)" opacity="0.06" stroke="#E8833A" stroke-width="0.5">
      <line x1="55" y1="42" x2="67" y2="30"/>
      <line x1="67" y1="42" x2="79" y2="30"/>
      <line x1="79" y1="42" x2="91" y2="30"/>
      <line x1="91" y1="42" x2="103" y2="30"/>
      <line x1="103" y1="42" x2="115" y2="30"/>
      <line x1="115" y1="42" x2="127" y2="30"/>
      <line x1="127" y1="42" x2="139" y2="30"/>
      <line x1="139" y1="42" x2="151" y2="30"/>
      <line x1="151" y1="42" x2="163" y2="30"/>
      <line x1="163" y1="42" x2="175" y2="30"/>
      <line x1="175" y1="42" x2="187" y2="30"/>
      <line x1="187" y1="42" x2="199" y2="30"/>
      <line x1="199" y1="42" x2="211" y2="30"/>
      <line x1="211" y1="42" x2="215" y2="38"/>
    </g>

    <!-- ===== DIMENSION LINES ===== -->

    <!-- BOTTOM: Overall width 80mm -->
    <line x1="55" y1="47" x2="55" y2="58" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="215" y1="47" x2="215" y2="58" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="55" y1="55" x2="121" y2="55" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="149" y1="55" x2="215" y2="55" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="55,55 60,53 60,57" fill="rgba(255,255,255,0.4)"/>
    <polygon points="215,55 210,53 210,57" fill="rgba(255,255,255,0.4)"/>
    <text x="135" y="59" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">80</text>

    <!-- RIGHT: Overall height 6mm -->
    <line x1="220" y1="30" x2="231" y2="30" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="220" y1="42" x2="231" y2="42" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <line x1="228" y1="30" x2="228" y2="32" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <line x1="228" y1="40" x2="228" y2="42" stroke="rgba(255,255,255,0.3)" stroke-width="0.6"/>
    <polygon points="228,30 226,34 230,34" fill="rgba(255,255,255,0.4)"/>
    <polygon points="228,42 226,38 230,38" fill="rgba(255,255,255,0.4)"/>
    <text x="248" y="40" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="11" font-weight="500" fill="rgba(255,255,255,0.7)">6</text>

    <!-- Center axis -->
    <line x1="135" y1="26" x2="135" y2="46" stroke="rgba(255,255,255,0.05)" stroke-width="0.5" stroke-dasharray="8,5"/>
  </g>

  <!-- Unit note -->
  <text x="155" y="92" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="9" fill="rgba(255,255,255,0.25)" letter-spacing="0.04em">All dimensions in mm</text>
</svg>